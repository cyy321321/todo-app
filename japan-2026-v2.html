<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>日本行 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f0;--surf:#fff;--ink:#1a1a1a;--ink2:#555;--ink3:#999;--bdr:#e8e8e4;--red:#c0392b;--blue:#1a56a0;--grn:#1a7a3c;--grn-s:#edfaf3;--amb:#b45309;--amb-s:#fef9ec;--pur:#6d28d9;--tel:#0f766e;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;max-width:540px;margin:0 auto;font-size:14px}
.hd{background:var(--ink);color:#fff;padding:16px 18px 0;position:sticky;top:0;z-index:100}
.hd-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.hd-title{font-size:17px;font-weight:900}.hd-title em{color:#facc15;font-style:normal}
.hd-total{font-family:'JetBrains Mono',monospace;font-size:11px;color:#facc15;text-align:right;line-height:1.6;white-space:pre-line}
.tabs{display:flex;border-top:1px solid #2a2a2a}
.tab{flex:1;padding:10px 0;text-align:center;font-size:10px;font-weight:700;color:#666;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:#facc15;border-bottom-color:#facc15}
main{padding-bottom:48px}.pane{display:none}.pane.on{display:block}
/* FILTERS */
.flt{padding:10px 14px;background:var(--surf);border-bottom:1px solid var(--bdr);position:sticky;top:82px;z-index:90}
.sb{display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:8px;padding:7px 10px;margin-bottom:8px}
.sb input{flex:1;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink);outline:none}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--bdr);background:var(--surf);color:var(--ink2);white-space:nowrap;transition:all .12s}
.chip.on{border-color:transparent;color:#fff}
.chip[data-v="全部"].on,.chip[data-v="all"].on{background:var(--ink)}
.chip[data-v="餐飲"].on{background:var(--red)}.chip[data-v="購物"].on{background:var(--amb)}
.chip[data-v="超市"].on{background:var(--grn)}.chip[data-v="交通"].on{background:var(--blue)}
.chip[data-v="景點"].on{background:var(--tel)}.chip[data-v="機場"].on{background:var(--pur)}
.chip[data-v="已對應"].on{background:var(--grn)}.chip[data-v="待確認"].on{background:var(--amb)}
.chip[data-v="無收據"].on{background:var(--red)}.chip[data-v="手續費"].on{background:var(--ink3)}
/* SUMMARY */
.ss{display:flex;background:var(--surf);border-bottom:1px solid var(--bdr)}
.sc{flex:1;padding:8px 0;text-align:center;border-right:1px solid var(--bdr)}.sc:last-child{border-right:none}
.sl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.04em}
.sv{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px}.sv.r{color:var(--red)}
/* DATE */
.dg{margin:12px 14px 0}
.dl{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.05em;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.dl::after{content:'';flex:1;height:1px;background:var(--bdr)}.dt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3)}
/* RECEIPT CARD */
.rc{background:var(--surf);border-radius:10px;margin-bottom:7px;border:1.5px solid var(--bdr);overflow:hidden}
.rch{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer}
.rcd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rci{flex:1;min-width:0}.rcs{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rct{font-size:10px;color:var(--ink3);margin-top:2px}
.rca{text-align:right;flex-shrink:0}
.rcj{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.rctw{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3);margin-top:1px}
.rcv{color:var(--ink3);font-size:10px;transition:transform .2s;flex-shrink:0;margin-left:3px}.rcv.open{transform:rotate(180deg)}
.rit{display:none;border-top:1px solid var(--bdr);background:var(--bg)}.rit.show{display:block}
.ir{display:flex;align-items:center;gap:6px;padding:7px 12px;border-bottom:1px solid var(--bdr)}.ir:last-child{border-bottom:none}
.irn{flex:1;font-size:12px;color:var(--ink2);line-height:1.4}
.irq{font-size:10px;color:var(--ink3);min-width:22px;text-align:center;flex-shrink:0}
.irp{text-align:right;flex-shrink:0}
.irj{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.irt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3)}
.ir.sub{background:var(--surf)}.ir.sub .irn{font-weight:700;color:var(--ink)}.ir.sub .irj{color:var(--red);font-size:13px}
/* RECONCILE */
.rflt{padding:10px 14px;background:var(--surf);border-bottom:1px solid var(--bdr);position:sticky;top:82px;z-index:90}
.rss{display:flex;background:var(--surf);border-bottom:1px solid var(--bdr)}
.rsc{flex:1;padding:8px 0;text-align:center;border-right:1px solid var(--bdr)}.rsc:last-child{border-right:none}
.rsl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.04em}
.rsv{font-size:16px;font-weight:900;font-family:'JetBrains Mono',monospace;margin-top:2px}
.rsv.g{color:var(--grn)}.rsv.a{color:var(--amb)}.rsv.r{color:var(--red)}.rsv.gr{color:var(--ink3)}
.rl{padding:0 14px;margin-top:12px}
.ri2{background:var(--surf);border-radius:10px;margin-bottom:8px;border:1.5px solid var(--bdr);overflow:hidden}
.ri2.matched{border-color:var(--grn)}.ri2.unmatched{border-color:var(--amb)}
.ri2.no-receipt{border-color:var(--red)}.ri2.fee{opacity:.6}
.rirow{display:flex}
.ricc{flex:1;padding:10px 11px;border-right:1px solid var(--bdr);min-width:0}
.rirec{flex:1;padding:10px 11px;min-width:0}
.rilbl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.04em;margin-bottom:3px}
.rish{font-size:12px;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.riam{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:3px}
.ridt{font-size:10px;color:var(--ink3);margin-top:2px}
.rist{display:flex;align-items:center;justify-content:center;padding:5px 12px;border-top:1px solid var(--bdr);font-size:11px;font-weight:700}
.ri2.matched .rist{background:var(--grn-s);color:var(--grn)}.ri2.unmatched .rist{background:var(--amb-s);color:var(--amb)}
.ri2.no-receipt .rist{background:#fdf0ef;color:var(--red)}.ri2.fee .rist{background:var(--bg);color:var(--ink3)}
/* OVERVIEW */
.ovh{background:var(--ink);color:#fff;padding:18px 18px 22px}
.ovl{font-size:10px;color:#666;font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.ovj{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:#facc15;line-height:1}
.ovt{font-size:12px;color:#aaa;margin-top:4px;font-family:'JetBrains Mono',monospace}
.ovs{font-size:11px;color:#666;margin-top:3px;font-family:'JetBrains Mono',monospace}
.ovg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#222;margin-top:16px;border-radius:8px 8px 0 0;overflow:hidden}
.os{background:#1a1a1a;padding:10px 12px}
.osl{font-size:9px;color:#555;font-weight:700;letter-spacing:.04em}
.osv{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;margin-top:2px}
.catsec{padding:14px}.catttl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.07em;margin-bottom:10px}
.cbi{margin-bottom:10px}.cbt{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.cbi-i{font-size:15px;width:24px;text-align:center}.cbi-n{font-size:13px;font-weight:700;flex:1}
.cbi-a{text-align:right}.cbi-j{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.cbi-t{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3)}
.cbi-p{font-size:10px;color:var(--ink3);min-width:26px;text-align:right}
.bt{background:var(--bdr);border-radius:3px;height:5px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.fisec{padding:0 14px 14px}
.fi{background:var(--surf);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;border:1.5px solid var(--bdr)}
.fi-i{font-size:18px;width:28px;text-align:center}.fi-n{flex:1}
.fi-nm{font-size:13px;font-weight:700}.fi-sb{font-size:10px;color:var(--ink3);margin-top:2px}
.fi-a{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.empty{text-align:center;padding:40px 20px;color:var(--ink3)}.empty .ei{font-size:32px;margin-bottom:8px}
.t-餐飲{color:#c0392b}.t-購物{color:#b45309}.t-超市{color:#1a7a3c}.t-交通{color:#1a56a0}.t-景點{color:#0f766e}.t-機場{color:#6d28d9}
</style>
</head>

let aC='全部', sQ='', rF='全部';

function sw(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['receipts','reconcile','overview'][i]===t));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.getElementById('pane-'+t).classList.add('on');
  if(t==='overview')renderOV();
  if(t==='reconcile')renderRec();
}

function initChips(){
  ['餐飲','購物','超市','交通','景點','機場'].unshift('全部');
  document.getElementById('catChips').innerHTML=['全部','餐飲','購物','超市','交通','景點','機場'].map(c=>
    `<div class="chip ${c==='全部'?'on':''}" data-v="${c}" onclick="setC('${c}')">${CI[c]||''} ${c}</div>`).join('');
  document.getElementById('recChips').innerHTML=['全部','已對應','待確認','無收據','手續費'].map(r=>
    `<div class="chip ${r==='全部'?'on':''}" data-v="${r}" onclick="setRF('${r}')">${r}</div>`).join('');
}
function setC(c){aC=c;document.querySelectorAll('#catChips .chip').forEach(el=>el.classList.toggle('on',el.dataset.v===c));renderR();}
function setRF(f){rF=f;document.querySelectorAll('#recChips .chip').forEach(el=>el.classList.toggle('on',el.dataset.v===f));renderRec();}
function hl(t){if(!sQ)return t;return t.replace(new RegExp(sQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark style="background:#facc15;border-radius:2px">${m}</mark>`);}

function renderR(){
  sQ=document.getElementById('si').value.trim().toLowerCase();
  const f=RS.filter(r=>(aC==='全部'||r.cat===aC)&&(!sQ||r.shop.toLowerCase().includes(sQ)||r.items.some(i=>i.name.toLowerCase().includes(sQ))));
  const tj=f.reduce((s,r)=>s+r.total,0);
  const ti=f.reduce((s,r)=>s+r.items.filter(i=>i.price>0).length,0);
  document.getElementById('ss').innerHTML=`
    <div class="sc"><div class="sl">收據</div><div class="sv">${f.length}</div></div>
    <div class="sc"><div class="sl">品項</div><div class="sv">${ti}</div></div>
    <div class="sc"><div class="sl">日圓</div><div class="sv r">${fj(tj)}</div></div>
    <div class="sc"><div class="sl">台幣</div><div class="sv">NT$${jt(tj).toLocaleString()}</div></div>`;
  const grp={};f.forEach(r=>{(grp[r.date]||(grp[r.date]=[])).push(r);});
  const c=document.getElementById('rc');
  if(!f.length){c.innerHTML='<div class="empty"><div class="ei">🔍</div><p>找不到符合的收據</p></div>';return;}
  c.innerHTML=Object.entries(grp).map(([d,items])=>{
    const dt=items.reduce((s,r)=>s+r.total,0);
    return`<div class="dg"><div class="dl">${d} ${DL[d]||''}<span class="dt">${fj(dt)} / NT$${jt(dt).toLocaleString()}</span></div>${items.map(r=>bRC(r)).join('')}</div>`;
  }).join('');
}

function bRC(r){
  const col=CCOL[r.cat]||'#999';
  const ih=r.items.map(i=>`<div class="ir">
    <div class="irn">${hl(i.name)}</div>
    <div class="irq">${i.qty>1?'×'+i.qty:''}</div>
    <div class="irp">
      <div class="irj" style="color:${i.price<0?'var(--grn)':'var(--ink)'}">${i.price<0?'−':''}${fj(Math.abs(i.price))}</div>
      ${i.price>0?`<div class="irt">${ft(Math.abs(i.price))}</div>`:''}
    </div>
  </div>`).join('');
  return`<div class="rc">
    <div class="rch" onclick="tog(${r.id})">
      <div class="rcd" style="background:${col}"></div>
      <div class="rci"><div class="rcs">${hl(r.shop)}</div><div class="rct">${r.time?r.date+' '+r.time:r.date} · ${r.cat}</div></div>
      <div class="rca"><div class="rcj t-${r.cat}">${fj(r.total)}</div><div class="rctw">${ft(r.total)}</div></div>
      <div class="rcv" id="cv-${r.id}">▼</div>
    </div>
    <div class="rit" id="it-${r.id}">
      ${ih}
      <div class="ir sub"><div class="irn">合計</div><div class="irq"></div>
        <div class="irp"><div class="irj">${fj(r.total)}</div><div class="irt">${ft(r.total)}</div></div>
      </div>
    </div>
  </div>`;
}
function tog(id){const el=document.getElementById('it-'+id),cv=document.getElementById('cv-'+id);el.classList.toggle('show');cv.classList.toggle('open',el.classList.contains('show'));}

function renderRec(){
  const fl=CCDATA.filter(c=>rF==='全部'||(rF==='已對應'&&c.type==='matched')||(rF==='待確認'&&c.type==='unmatched')||(rF==='無收據'&&c.type==='no-receipt')||(rF==='手續費'&&c.type==='fee'));
  const m=CCDATA.filter(c=>c.type==='matched').length,u=CCDATA.filter(c=>c.type==='unmatched').length,n=CCDATA.filter(c=>c.type==='no-receipt').length,fe=CCDATA.filter(c=>c.type==='fee').length;
  document.getElementById('rss').innerHTML=`
    <div class="rsc"><div class="rsl">已對應</div><div class="rsv g">${m}</div></div>
    <div class="rsc"><div class="rsl">待確認</div><div class="rsv a">${u}</div></div>
    <div class="rsc"><div class="rsl">無收據</div><div class="rsv r">${n}</div></div>
    <div class="rsc"><div class="rsl">手續費</div><div class="rsv gr">${fe}</div></div>`;
  const SL={matched:'✓ 已對應',unmatched:'⚠️ 待確認',fee:'— 手續費','no-receipt':'✕ 無收據'};
  const list=document.getElementById('rl');
  if(!fl.length){list.innerHTML='<div class="empty"><div class="ei">📋</div><p>沒有符合的記錄</p></div>';return;}
  list.innerHTML=fl.map(c=>{
    const rec=c.rid?RS.find(r=>r.id===c.rid):null;
    return`<div class="ri2 ${c.type}">
      <div class="rirow">
        <div class="ricc"><div class="rilbl">信用卡明細</div><div class="rish">${c.shop}</div>
          <div class="riam">NT$${c.twd?c.twd.toLocaleString():'—'}${c.jpy?' / '+fj(c.jpy):''}</div>
          <div class="ridt">${c.date}</div></div>
        <div class="rirec"><div class="rilbl">對應收據</div>
          ${rec?`<div class="rish">${rec.shop}</div><div class="riam">${fj(rec.total)} / NT$${jt(rec.total).toLocaleString()}</div><div class="ridt">${rec.date} ${rec.time||''}</div>`
          :`<div class="rish" style="color:var(--ink3);font-size:11px;white-space:normal">${c.type==='fee'?'（海外手續費，不計入消費）':c.note||'找不到對應收據'}</div>`}
        </div>
      </div>
      <div class="rist">${SL[c.type]||''}</div>
    </div>`;
  }).join('');
}

function renderOV(){
  const total=RS.reduce((s,r)=>s+r.total,0);
  const ic=RS.reduce((s,r)=>s+r.items.filter(i=>i.price>0).length,0);
  const fixedTwd=26036+11309+6546+12111;
  document.getElementById('ovJ').textContent=fj(total);
  document.getElementById('ovT').textContent=ft(total);
  document.getElementById('ovS').textContent=`7 天 · 日均 ${fj(Math.round(total/7))} / NT$${jt(Math.round(total/7)).toLocaleString()}`;
  document.getElementById('osC').textContent=RS.length+'張';
  document.getElementById('osI').textContent=ic+'項';
  document.getElementById('osT').textContent='NT$'+(jt(total)+fixedTwd).toLocaleString();
  document.getElementById('fixedTotal').textContent='NT$'+fixedTwd.toLocaleString();
  document.getElementById('grandTotal').textContent='NT$'+(jt(total)+fixedTwd).toLocaleString();
  document.getElementById('hdT').textContent=fj(total)+'\nNT$'+jt(total).toLocaleString();
  const ct={};RS.forEach(r=>{ct[r.cat]=(ct[r.cat]||0)+r.total;});
  const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  const grand=sorted.reduce((s,[,v])=>s+v,0)||1;
  document.getElementById('catBars').innerHTML=sorted.map(([cat,val])=>`
    <div class="cbi">
      <div class="cbt"><div class="cbi-i">${CI[cat]||'📦'}</div><div class="cbi-n">${cat}</div>
        <div class="cbi-a"><div class="cbi-j t-${cat}">${fj(val)}</div><div class="cbi-t">${ft(val)}</div></div>
        <div class="cbi-p">${Math.round(val/grand*100)}%</div></div>
      <div class="bt"><div class="bf" style="width:${val/grand*100}%;background:${CCOL[cat]}"></div></div>
    </div>`).join('');
}

initChips();renderR();renderOV();
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To Do List</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --o1:#FFFBF5;--o2:#FFF8F0;--o3:#FFF3E0;--o4:#FAC775;--o5:#EF9F27;--o6:#BA7517;--o7:#854F0B;--o8:#633806;--o9:#412402;
  --g1:#EAF3DE;--g2:#C0DD97;--g3:#97C459;--g4:#639922;--g5:#3B6D11;
  --red:#DC2626;--red-bg:#FEF2F2;
  --shadow:0 2px 8px rgba(186,117,23,.12);
  --shadow-md:0 4px 20px rgba(186,117,23,.16);
  --r:14px;--r-sm:10px;--r-xs:8px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--o1);color:var(--o9);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* LOGIN */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#FFFBF5,#FFF3E0);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:24px;padding:48px 40px;box-shadow:var(--shadow-md);max-width:400px;width:100%;text-align:center;border:1px solid var(--o4)}
.login-ico{font-size:48px;margin-bottom:16px}
.login-title{font-size:24px;font-weight:700;color:var(--o8);margin-bottom:8px}
.login-sub{font-size:14px;color:var(--o6);line-height:1.7;margin-bottom:32px}
#login-err{color:var(--red);font-size:13px;margin-top:16px;display:none;padding:10px;background:var(--red-bg);border-radius:10px}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}

/* HEADER */
.hdr{background:#fff;border-bottom:2px solid var(--o4);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:32px;height:32px;border-radius:50%;background:var(--o5);display:flex;align-items:center;justify-content:center;font-size:18px}
.hdr-title{font-size:16px;font-weight:700;color:var(--o8)}
.hdr-right{display:flex;align-items:center;gap:8px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--o5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.hdr-email{font-size:12px;color:var(--o6);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-btn{background:var(--o3);color:var(--o7);border:1.5px solid var(--o4);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.pill-btn:hover{background:var(--o4);color:var(--o9)}

/* VIEW TABS */
.view-bar{background:#fff;border-bottom:2px solid var(--o4);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:44px}
.view-tabs{display:flex;gap:4px}
.vtab{font-size:12px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--o4);background:none;cursor:pointer;font-family:inherit;color:var(--o6);font-weight:500;transition:all .15s}
.vtab.on{background:var(--o5);color:#fff;border-color:var(--o5)}
.vtab:hover:not(.on){background:var(--o3)}
.view-nav{display:flex;align-items:center;gap:6px}
.nav-btn{background:var(--o3);border:1.5px solid var(--o4);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--o7)}
.nav-btn:hover{background:var(--o4)}
.nav-label{font-size:13px;font-weight:500;color:var(--o8);min-width:80px;text-align:center}

/* SUGGESTION */
.sug{background:var(--o3);border-bottom:2px solid var(--o4);padding:10px 20px;display:flex;align-items:flex-start;gap:10px}
.sug-ico{font-size:16px;flex-shrink:0;margin-top:1px}
.sug-txt{font-size:13px;color:var(--o7);line-height:1.6;flex:1}
.sug-txt b{color:var(--o9)}
.sug-refresh{font-size:11px;color:var(--o7);background:none;border:none;cursor:pointer;padding:2px 8px;border-radius:10px;font-family:inherit;flex-shrink:0;margin-top:2px}
.sug-refresh:hover{background:var(--o4);color:#fff}

/* INPUT TOGGLE */
.toggle-bar{background:#fff;border-bottom:1px solid var(--o4);padding:0 20px}
.toggle-btn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--o6);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:10px 0;width:100%}
.toggle-btn:hover{color:var(--o8)}
.t-arrow{font-size:10px;transition:transform .25s;margin-left:auto}
.t-arrow.open{transform:rotate(180deg)}

/* INPUT PANEL */
.input-panel{background:#fff;border-bottom:2px solid var(--o4);overflow:hidden;max-height:0;transition:max-height .3s ease}
.input-panel.open{max-height:520px}
.input-inner{padding:16px 20px}
.seg-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.seg{font-size:12px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--o4);background:none;cursor:pointer;font-family:inherit;color:var(--o6);font-weight:500;transition:all .15s}
.seg.on{background:var(--o5);color:#fff;border-color:var(--o5)}
.seg:hover:not(.on){background:var(--o3)}
textarea{width:100%;height:100px;border:1.5px solid var(--o4);border-radius:var(--r-sm);padding:10px;font-size:12px;font-family:'JetBrains Mono',monospace;resize:none;outline:none;background:var(--o2);color:var(--o9);transition:border .15s}
textarea:focus{border-color:var(--o5)}
textarea::placeholder{font-family:'Noto Sans TC',sans-serif;color:var(--o4)}
.ai-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.ai-btns{display:flex;flex-direction:column;gap:6px}
.man-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.fld label{font-size:11px;font-weight:500;color:var(--o6)}
.fld input,.fld select{border:1.5px solid var(--o4);border-radius:var(--r-xs);padding:8px 10px;font-size:13px;font-family:inherit;background:var(--o2);color:var(--o9);outline:none;transition:border .15s}
.fld input:focus,.fld select:focus{border-color:var(--o5);background:#fff}

/* BUTTONS */
.btn{border:none;border-radius:var(--r-xs);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-ora{background:var(--o5);color:#fff}
.btn-ora:hover{background:var(--o6)}
.btn-grn{background:var(--g4);color:#fff}
.btn-grn:hover{background:var(--g5)}
.btn-soft{background:var(--o3);color:var(--o7);border:1.5px solid var(--o4)}
.btn-soft:hover{background:var(--o4);color:var(--o9)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* HINT BAR */
.hint-bar{background:var(--o2);border-bottom:1px solid var(--o4);padding:8px 20px;display:flex;align-items:center;gap:10px}
.hint-txt{font-size:12px;color:var(--o7);flex:1;line-height:1.5}
.hint-copy{font-size:11px;color:var(--o7);background:#fff;border:1.5px solid var(--o4);border-radius:20px;padding:4px 12px;cursor:pointer;font-family:inherit;white-space:nowrap;font-weight:500}
.hint-copy:hover{background:var(--o4);color:var(--o9)}

/* MAIN */
#main-view{padding:16px 20px}

/* CALENDAR VIEW */
.cal-grid-wrap{margin-bottom:8px}
.cal-week-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-wday{text-align:center;font-size:11px;font-weight:500;color:var(--o6);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{background:#fff;border-radius:var(--r-xs);padding:6px 5px;min-height:72px;border:1.5px solid var(--o4);cursor:pointer;transition:all .15s}
.cal-cell:hover{background:var(--o3);border-color:var(--o5)}
.cal-cell.today{background:var(--o3);border-color:var(--o5);border-width:2px}
.cal-cell.other-month{opacity:.4}
.cal-num{font-size:12px;font-weight:500;color:var(--o7);margin-bottom:4px}
.cal-cell.today .cal-num{color:var(--o5);font-weight:700}
.cal-ev-dot{font-size:10px;padding:1px 5px;border-radius:6px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.dot-work{background:var(--o4);color:var(--o9)}
.dot-priv{background:var(--g2);color:var(--g5)}
.dot-synced{opacity:.7}

/* WEEK VIEW */
.week-grid{display:grid;grid-template-columns:48px repeat(5,1fr);gap:4px;margin-bottom:8px}
.time-col{display:flex;flex-direction:column}
.time-slot{height:48px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:6px;font-size:10px;color:var(--o6);padding-top:2px;font-family:'JetBrains Mono',monospace}
.week-day-col{background:#fff;border-radius:var(--r-sm);border:1.5px solid var(--o4);overflow:hidden;min-height:240px;position:relative}
.week-day-col.today-col{border-color:var(--o5);border-width:2px;background:var(--o2)}
.week-day-hdr{text-align:center;padding:6px 4px;font-size:11px;font-weight:500;color:var(--o7);border-bottom:1px solid var(--o4);background:var(--o3)}
.week-day-col.today-col .week-day-hdr{color:var(--o5);background:var(--o3)}
.week-events{padding:4px;position:relative}
.week-ev{border-radius:6px;padding:4px 6px;margin-bottom:3px;cursor:pointer;transition:opacity .15s}
.week-ev:hover{opacity:.85}
.week-ev-work{background:var(--o4);color:var(--o9)}
.week-ev-priv{background:var(--g2);color:var(--g5)}
.week-ev-time{font-size:9px;opacity:.8;margin-bottom:1px;font-family:'JetBrains Mono',monospace}
.week-ev-title{font-size:10px;font-weight:500;line-height:1.3}
.week-ev-code{font-size:9px;opacity:.7;font-family:'JetBrains Mono',monospace}
.week-ev-synced{font-size:9px;color:var(--g4);margin-top:1px}

/* LIST VIEW */
.proj-grp{margin-bottom:18px}
.proj-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.proj-code-tag{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--o4);color:var(--o9);padding:2px 8px;border-radius:6px;font-weight:500}
.proj-code-tag.warn{background:var(--red-bg);color:var(--red)}
.proj-name-lbl{font-size:12px;color:var(--o6)}
.task-card{background:#fff;border-radius:var(--r);border:1.5px solid var(--o4);padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--shadow);transition:all .15s;border-left:4px solid var(--o5)}
.task-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card.priv{border-left-color:var(--g4)}
.task-card.done{opacity:.45}
.task-card.done .task-title{text-decoration:line-through;color:var(--o6)}
.task-card.overdue{border-left-color:var(--red)}
.chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--o4);cursor:pointer;flex-shrink:0;margin-top:2px;background:none;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent;transition:all .15s}
.chk:hover{border-color:var(--o5)}
.chk.on{background:var(--o5);border-color:var(--o5);color:#fff}
.chk.gn{background:var(--g4);border-color:var(--g4);color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:5px;color:var(--o9)}
.task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.task-date{font-size:11px;color:var(--o6);font-family:'JetBrains Mono',monospace}
.prio{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.ph{background:var(--red-bg);color:var(--red)}
.pm{background:var(--o3);color:var(--o7)}
.pl{background:var(--g1);color:var(--g5)}
.t-code{font-size:10px;color:var(--o6);font-family:'JetBrains Mono',monospace;background:var(--o3);padding:1px 6px;border-radius:6px}
.synced-badge{font-size:10px;color:var(--g4);font-weight:500}
.task-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-card:hover .task-actions{opacity:1}
.t-act-btn{font-size:12px;border:1.5px solid var(--o4);background:var(--o3);border-radius:8px;cursor:pointer;padding:4px 8px;color:var(--o7);font-family:inherit;transition:all .15s}
.t-act-btn:hover{background:var(--o5);border-color:var(--o5);color:#fff}
.t-act-btn.del:hover{background:var(--red);border-color:var(--red);color:#fff}
.empty{text-align:center;padding:48px 20px;color:var(--o4);font-size:13px}
.empty-ico{font-size:36px;margin-bottom:10px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(99,56,6,.35);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md);border:2px solid var(--o4)}
.modal-title{font-size:16px;font-weight:700;color:var(--o8);margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.parsed-item{background:var(--o2);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;border:1.5px solid var(--o4)}
.pi-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:600}
.pi-work{color:var(--o7)}
.pi-priv{color:var(--g4)}
.pi-note{font-size:11px;color:var(--o6);font-weight:400}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fi label{font-size:11px;font-weight:500;color:var(--o6)}
.fi input,.fi select{border:1.5px solid var(--o4);border-radius:var(--r-xs);padding:7px 9px;font-size:12px;font-family:inherit;background:#fff;color:var(--o9);outline:none;width:100%}
.fi input:focus,.fi select:focus{border-color:var(--o5)}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.warn-sel{border-color:var(--red)!important}
.proj-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--o4);font-size:13px}
.proj-code{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--o4);color:var(--o9);padding:2px 8px;border-radius:6px}
.proj-nm{flex:1;color:var(--o7)}
.pdel{color:var(--o4);background:none;border:none;cursor:pointer;padding:4px 8px;font-size:14px;border-radius:6px}
.pdel:hover{color:var(--red);background:var(--red-bg)}
.padd-row{display:flex;gap:8px;margin-top:12px}
.padd-row input{flex:1;border:1.5px solid var(--o4);border-radius:var(--r-xs);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--o9);outline:none;background:var(--o2)}
.padd-row input:focus{border-color:var(--o5);background:#fff}

/* TOAST */
.toast{position:fixed;bottom:24px;right:20px;padding:10px 18px;border-radius:14px;font-size:13px;z-index:999;opacity:0;transform:translateY(60px);transition:all .3s;pointer-events:none;font-weight:500}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--g5);color:#fff}
.toast.err{background:#991B1B;color:#fff}
.toast.info{background:var(--o8);color:#fff}

.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--o4);border-radius:3px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-ico">🍊</div>
    <div class="login-title">My To Do List</div>
    <div class="login-sub">整理公事與私人行程，同步 Google Calendar。<br>請使用指定 Google 帳號登入。</div>
    <div id="g-btn" style="display:flex;justify-content:center"></div>
    <div id="login-err">❌ 此帳號無使用權限</div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">🍊</div>
      <span class="hdr-title">My To Do List</span>
    </div>
    <div class="hdr-right">
      <div class="avatar" id="u-av">U</div>
      <span class="hdr-email" id="u-em"></span>
      <button class="pill-btn" onclick="openProjModal()">⚙ 管理案子</button>
    </div>
  </div>

  <div class="sug">
    <span class="sug-ico">✨</span>
    <div class="sug-txt" id="sug-txt"><span style="color:var(--o4);font-style:italic">分析今日建議中…</span></div>
    <button class="sug-refresh" onclick="buildSuggestion()">↻ 重新分析</button>
  </div>

  <div class="hint-bar">
    <span style="font-size:15px">💡</span>
    <div class="hint-txt">用 Claude 整理信件或 Line 訊息後，把結果貼到「新增任務」匯入。</div>
    <button class="hint-copy" onclick="copyPrompt()">複製 Claude 提示詞</button>
  </div>

  <div class="toggle-bar">
    <button class="toggle-btn" onclick="toggleInput()">
      ＋ 新增任務 / 匯入整理結果
      <span class="t-arrow" id="t-arrow">▼</span>
    </button>
  </div>

  <div class="input-panel" id="input-panel">
    <div class="input-inner">
      <div class="seg-tabs">
        <button class="seg on" id="it-paste" onclick="setITab('paste')">📋 貼上 Claude 整理結果</button>
        <button class="seg" id="it-work" onclick="setITab('work')">🏢 手動新增公事</button>
        <button class="seg" id="it-priv" onclick="setITab('priv')">🏠 手動新增私人行程</button>
      </div>
      <div id="area-paste">
        <div style="background:var(--o2);border-radius:var(--r-sm);padding:14px;border:1.5px solid var(--o4)">
          <div style="font-size:12px;font-weight:500;color:var(--o6);margin-bottom:8px">將 Claude 整理好的任務清單貼在這裡：</div>
          <div class="ai-row">
            <textarea id="paste-box" placeholder="任務名稱：審核 Q3 財報&#10;計畫代碼：1278P&#10;類型：公事&#10;截止日期：2026-06-13&#10;優先級：高&#10;---&#10;任務名稱：家庭聚餐&#10;類型：私人&#10;日期：2026-06-15&#10;時間：18:00"></textarea>
            <div class="ai-btns">
              <button class="btn btn-ora" onclick="parsePaste()">⚡ 解析</button>
              <button class="btn btn-soft" onclick="document.getElementById('paste-box').value=''">清除</button>
            </div>
          </div>
        </div>
      </div>
      <div id="area-work" style="display:none">
        <div class="man-row">
          <div class="fld"><label>任務名稱</label><input type="text" id="w-title" placeholder="例：審核合約文件"></div>
          <div class="fld"><label>計畫代碼</label><select id="w-code"></select></div>
          <div class="fld"><label>截止日期</label><input type="date" id="w-date"></div>
          <div class="fld"><label>開始時間</label><input type="time" id="w-start" value="09:00"></div>
          <div class="fld"><label>結束時間</label><input type="time" id="w-end" value="10:00"></div>
          <button class="btn btn-ora" onclick="addWork()" style="align-self:flex-end;margin-bottom:0">新增</button>
        </div>
      </div>
      <div id="area-priv" style="display:none">
        <div class="man-row">
          <div class="fld"><label>行程名稱</label><input type="text" id="p-title" placeholder="例：看診、家庭聚餐"></div>
          <div class="fld"><label>日期</label><input type="date" id="p-date"></div>
          <div class="fld"><label>開始時間</label><input type="time" id="p-start" value="18:00"></div>
          <div class="fld"><label>結束時間</label><input type="time" id="p-end" value="20:00"></div>
          <div class="fld"><label>地點（選填）</label><input type="text" id="p-loc" placeholder="例：台大醫院"></div>
          <button class="btn btn-grn" onclick="addPriv()" style="align-self:flex-end;margin-bottom:0">新增</button>
        </div>
      </div>
    </div>
  </div>

  <div class="view-bar">
    <div class="view-tabs">
      <button class="vtab on" id="vt-cal" onclick="setView('cal')">📅 月曆</button>
      <button class="vtab" id="vt-week" onclick="setView('week')">📆 週視圖</button>
      <button class="vtab" id="vt-list" onclick="setView('list')">📋 清單</button>

      <button class="nav-btn" onclick="navPrev()">‹</button>
      <span class="nav-label" id="nav-label"></span>

  <div id="main-view"></div>
</div>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-title">🍊 確認並調整任務資訊</div>
    <div id="parsed-list"></div>
    <div class="modal-actions">
      <button class="btn btn-soft" onclick="closeModal('confirm-modal')">取消</button>

<div class="modal-overlay" id="proj-modal">
  <div class="modal">
    <div class="modal-title">⚙ 管理案子清單</div>
    <div id="proj-list"></div>
    <div class="padd-row">
      <input type="text" id="new-code" placeholder="1234A" maxlength="5" style="max-width:90px;font-family:'JetBrains Mono',monospace;text-transform:uppercase">

      <button class="btn btn-ora" onclick="addProj()">新增</button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CFG={
  CLIENT_ID:'622489782668-81884uub8oh42pqofhl0psh03cloc3so.apps.googleusercontent.com',
  ALLOWED_EMAIL:'uoii910986@gmail.com',
};
const CLAUDE_PROMPT=`請幫我整理以下信件或訊息中的待辦事項，輸出格式如下，每個任務用 --- 分隔：

任務名稱：（20字內，具體清晰）
計畫代碼：（若有4碼數字+1碼大寫英文如1234A則填入，否則填「待確認」）
類型：（公事 或 私人）
截止日期：（YYYY-MM-DD）
開始時間：（HH:MM，若有則填，否則略過）
結束時間：（HH:MM，若有則填，否則略過）
優先級：（高 / 中 / 低）
說明：（30字內背景說明）

以下是要整理的內容：
---
（請將信件或Line訊息貼在這裡）`;

let S={
  view:'cal', inputOpen:false, itab:'paste',
  calYear:new Date().getFullYear(), calMonth:new Date().getMonth(),
  weekOffset:0,
  projects:JSON.parse(localStorage.getItem('tm-projs')||'null')||[{code:'0000X',name:'待確認 / 其他'}],
  tasks:JSON.parse(localStorage.getItem('tm-tasks')||'[]'),
  pending:[],
  calToken:null,
};
const save=()=>{localStorage.setItem('tm-projs',JSON.stringify(S.projects));localStorage.setItem('tm-tasks',JSON.stringify(S.tasks));};

let tokenClient;
window.onload=()=>{
  google.accounts.id.initialize({client_id:CFG.CLIENT_ID,callback:onLogin});
  google.accounts.id.renderButton(document.getElementById('g-btn'),{theme:'outline',size:'large',width:240});
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CFG.CLIENT_ID,
    scope:'https://www.googleapis.com/auth/calendar.events',
    callback:r=>{S.calToken=r.access_token;},
  });
  const t=new Date().toISOString().split('T')[0];
  ['w-date','p-date'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=t;});
};

function onLogin(resp){
  const pl=JSON.parse(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  if(pl.email!==CFG.ALLOWED_EMAIL){document.getElementById('login-err').style.display='block';return;}
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  document.getElementById('u-em').textContent=pl.email;
  document.getElementById('u-av').textContent=pl.email[0].toUpperCase();
  tokenClient.requestAccessToken({prompt:''});
  fillCodeSel();renderView();buildSuggestion();
}

function toggleInput(){S.inputOpen=!S.inputOpen;document.getElementById('input-panel').classList.toggle('open',S.inputOpen);document.getElementById('t-arrow').classList.toggle('open',S.inputOpen);}
function setITab(t){S.itab=t;['paste','work','priv'].forEach(x=>{document.getElementById('it-'+x).className='seg'+(x===t?' on':'');document.getElementById('area-'+x).style.display=x===t?'block':'none';});}

function copyPrompt(){navigator.clipboard.writeText(CLAUDE_PROMPT).then(()=>toast('✅ 提示詞已複製，開新 Claude 對話貼上使用','ok')).catch(()=>toast('請手動複製提示詞','err'));}

function parsePaste(){
  const text=document.getElementById('paste-box').value.trim();
  if(!text){toast('請先貼上內容','err');return;}
  const blocks=text.split(/\n?---\n?/).filter(b=>b.trim());
  const tasks=[];
  blocks.forEach(block=>{
    const get=keys=>{for(const k of keys){const m=block.match(new RegExp(k+'[：:]\\s*(.+)','i'));if(m)return m[1].trim();}return '';};
    const title=get(['任務名稱','行程名稱','名稱','title']);
    if(!title)return;
    const typeRaw=get(['類型','type']);
    const codeRaw=get(['計畫代碼','代碼','code']);
    const dateRaw=get(['截止日期','日期','date']);
    const startRaw=get(['開始時間','時間','start','time']);
    const endRaw=get(['結束時間','end']);
    const prioRaw=get(['優先級','優先','priority']);
    const note=get(['說明','備註','note']);
    const type=(typeRaw.includes('私人')||typeRaw.toLowerCase()==='private')?'private':'work';
    const codeFromField=codeRaw?codeRaw.match(/\d{4}[A-Z]/):null;
    const codeFromBlock=block.match(/\d{4}[A-Z]/);
    const codeMatch=codeFromField||codeFromBlock;
    const code=type==='work'?(codeMatch?codeMatch[0]:'0000X'):null;
    const dateMatch=(dateRaw||'').match(/\d{4}-\d{2}-\d{2}/);
    const date=dateMatch?dateMatch[0]:new Date().toISOString().split('T')[0];
    const startMatch=(startRaw||'').match(/\d{1,2}:\d{2}/);
    const endMatch=(endRaw||'').match(/\d{1,2}:\d{2}/);
    const prioMap={'高':'high','中':'medium','低':'low','緊急':'high'};
    tasks.push({title,type,code,date,time:startMatch?startMatch[0]:null,timeEnd:endMatch?endMatch[0]:null,priority:prioMap[prioRaw]||'medium',note});
  });
  if(!tasks.length){toast('找不到任務格式，請確認內容','err');return;}
  S.pending=tasks;showConfirmModal();
}

function showConfirmModal(){
  const opts=S.projects.map(p=>`<option value="${p.code}">${p.code} — ${p.name}</option>`).join('');
  document.getElementById('parsed-list').innerHTML=S.pending.map((t,i)=>`
  <div class="parsed-item">
    <div class="pi-head"><span class="${t.type==='private'?'pi-priv':'pi-work'}">${t.type==='private'?'🏠 私人行程':'🏢 公事任務'}</span><span class="pi-note">${t.note||''}</span></div>
    <div class="fi"><label>任務名稱</label><input type="text" value="${t.title}" id="pt${i}-title"></div>
    ${t.type==='work'?`<div class="fi"><label>計畫代碼 ${t.code==='0000X'?'<span style="color:var(--red);font-size:10px">⚠ 請確認</span>':''}</label>
    <select id="pt${i}-code" class="${t.code==='0000X'?'warn-sel':''}" onchange="this.className=this.value==='0000X'?'warn-sel':''">
    ${opts.replace(`value="${t.code}"`,`value="${t.code}" selected`)}</select></div>`:''}
    <div class="fi-row">
      <div class="fi"><label>日期</label><input type="date" value="${t.date||''}" id="pt${i}-date"></div>
      <div class="fi"><label>優先級</label><select id="pt${i}-prio"><option value="high" ${t.priority==='high'?'selected':''}>🔴 緊急</option><option value="medium" ${t.priority==='medium'?'selected':''}>🟡 一般</option><option value="low" ${t.priority==='low'?'selected':''}>🟢 低</option></select></div>
    </div>
    <div class="fi-row">
      <div class="fi"><label>開始時間（選填）</label><input type="time" value="${t.time||''}" id="pt${i}-start"></div>
      <div class="fi"><label>結束時間（選填）</label><input type="time" value="${t.timeEnd||''}" id="pt${i}-end"></div>
    </div>
  </div>`).join('');
  document.getElementById('confirm-modal').classList.add('show');
}

async function commitTasks(){
  const newT=[];
  for(let i=0;i<S.pending.length;i++){
    const t=S.pending[i];
    const title=document.getElementById(`pt${i}-title`).value.trim();
    const date=document.getElementById(`pt${i}-date`).value;
    const start=document.getElementById(`pt${i}-start`)?.value||null;
    const end=document.getElementById(`pt${i}-end`)?.value||null;
    const code=t.type==='work'?(document.getElementById(`pt${i}-code`)?.value||'0000X'):null;
    const prio=document.getElementById(`pt${i}-prio`).value;
    if(!title||!date){toast('請填寫所有必填欄位','err');return;}
    const task={id:Date.now()+i,type:t.type,title,date,time:start,timeEnd:end,code,priority:prio,done:false,calEventId:null};
    const evId=await pushCal(task);
    if(evId)task.calEventId=evId;
    newT.push(task);
  }
  S.tasks.push(...newT);save();
  closeModal('confirm-modal');
  document.getElementById('paste-box').value='';
  renderView();buildSuggestion();
  toast(`✅ 已新增 ${newT.length} 個任務${S.calToken?'並推送至 Google Calendar':''}','ok');
}

function fillCodeSel(){const s=document.getElementById('w-code');if(!s)return;s.innerHTML=S.projects.map(p=>`<option value="${p.code}">${p.code} — ${p.name}</option>`).join('');}

async function addWork(){
  const title=document.getElementById('w-title').value.trim();
  const code=document.getElementById('w-code').value;
  const date=document.getElementById('w-date').value;
  const start=document.getElementById('w-start').value;
  const end=document.getElementById('w-end').value;
  if(!title){toast('請輸入任務名稱','err');return;}
  if(!date){toast('請選擇日期','err');return;}
  const task={id:Date.now(),type:'work',title,code,date,time:start||null,timeEnd:end||null,priority:'medium',done:false,calEventId:null};
  const evId=await pushCal(task);if(evId)task.calEventId=evId;
  S.tasks.push(task);save();renderView();buildSuggestion();
  document.getElementById('w-title').value='';
  toast('✅ 公事任務已新增'+(evId?' 並推送行事曆':''),'ok');
}

async function addPriv(){
  const title=document.getElementById('p-title').value.trim();
  const date=document.getElementById('p-date').value;
  const start=document.getElementById('p-start').value;
  const end=document.getElementById('p-end').value;
  const loc=document.getElementById('p-loc').value.trim();
  if(!title){toast('請輸入行程名稱','err');return;}
  if(!date){toast('請選擇日期','err');return;}
  const task={id:Date.now(),type:'private',title,date,time:start,timeEnd:end,loc,code:null,priority:'medium',done:false,calEventId:null};
  const evId=await pushCal(task);if(evId)task.calEventId=evId;
  S.tasks.push(task);save();renderView();buildSuggestion();
  document.getElementById('p-title').value='';document.getElementById('p-loc').value='';
  toast('✅ 私人行程已新增'+(evId?' 並推送行事曆':''),'ok');
}

async function pushCal(task){
  if(!S.calToken)return null;
  const st=task.time||'09:00';
  const et=task.timeEnd||addH(st);
  const ev={
    summary:task.type==='work'?`[${task.code}] ${task.title}`:task.title,
    start:{dateTime:`${task.date}T${st}:00`,timeZone:'Asia/Taipei'},
    end:{dateTime:`${task.date}T${et}:00`,timeZone:'Asia/Taipei'},
    colorId:task.type==='work'?'6':'10',
    location:task.loc||undefined,
  };
  try{
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',headers:{'Authorization':`Bearer ${S.calToken}`,'Content-Type':'application/json'},body:JSON.stringify(ev),
    });
    const d=await r.json();return d.id||null;
  }catch(e){console.error(e);return null;}
}

async function deleteCal(eventId){
  if(!S.calToken||!eventId)return;
  try{await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`,{method:'DELETE',headers:{'Authorization':`Bearer ${S.calToken}`}});}
  catch(e){console.error(e);}
}

const addH=t=>{const[h,m]=t.split(':').map(Number);return`${String((h+1)%24).padStart(2,'0')}:${String(m).padStart(2,'0')}`;};

function setView(v){
  S.view=v;
  ['cal','week','list'].forEach(x=>document.getElementById('vt-'+x).className='vtab'+(x===v?' on':''));
  renderView();
}

function navPrev(){if(S.view==='cal'){S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}}else if(S.view==='week'){S.weekOffset--;}renderView();}
function navNext(){if(S.view==='cal'){S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}}else if(S.view==='week'){S.weekOffset++;}renderView();}

function renderView(){
  fillCodeSel();
  if(S.view==='cal')renderCal();
  else if(S.view==='week')renderWeek();
  else renderList();
}

function renderCal(){
  const mn=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('nav-label').textContent=`${S.calYear} / ${mn[S.calMonth]}`;
  const today=new Date().toISOString().split('T')[0];
  const first=new Date(S.calYear,S.calMonth,1);
  const last=new Date(S.calYear,S.calMonth+1,0);
  let startDay=first.getDay()-1;if(startDay<0)startDay=6;
  let cells=[];
  for(let i=0;i<startDay;i++){const d=new Date(S.calYear,S.calMonth,1-startDay+i);cells.push({date:fmtDate(d),other:true});}
  for(let d=1;d<=last.getDate();d++){cells.push({date:`${S.calYear}-${String(S.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,other:false});}
  while(cells.length%7!==0)cells.push({date:'',other:true});
  const el=document.getElementById('main-view');
  el.innerHTML=`<div style="padding:16px 20px"><div class="cal-grid-wrap">
  <div class="cal-week-hdr">${['一','二','三','四','五','六','日'].map(d=>`<div class="cal-wday">${d}</div>`).join('')}</div>
  <div class="cal-grid">${cells.map(c=>{
    if(!c.date)return`<div class="cal-cell other-month"></div>`;
    const dayTasks=S.tasks.filter(t=>t.date===c.date&&!t.done);
    const isToday=c.date===today;
    return`<div class="cal-cell${c.other?' other-month':''}${isToday?' today':''}" onclick="calDayClick('${c.date}')">
      <div class="cal-num">${parseInt(c.date.split('-')[2])}</div>
      ${dayTasks.slice(0,2).map(t=>`<div class="cal-ev-dot ${t.type==='work'?'dot-work':'dot-priv'}${t.calEventId?' dot-synced':''}">${t.title}</div>`).join('')}
      ${dayTasks.length>2?`<div style="font-size:9px;color:var(--o6)">+${dayTasks.length-2}</div>`:''}
    </div>`;
  }).join('')}</div></div></div>`;
}

function calDayClick(date){
  const dayTasks=S.tasks.filter(t=>t.date===date);
  if(!dayTasks.length){setView('list');return;}
  setView('list');
}

function renderWeek(){
  const today=new Date();
  const monday=new Date(today);
  monday.setDate(today.getDate()-((today.getDay()+6)%7)+S.weekOffset*7);
  const days=[];
  for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d);}
  const todayStr=new Date().toISOString().split('T')[0];
  const startLbl=`${monday.getMonth()+1}/${monday.getDate()}`;
  const endD=new Date(monday);endD.setDate(monday.getDate()+4);
  const endLbl=`${endD.getMonth()+1}/${endD.getDate()}`;
  document.getElementById('nav-label').textContent=`${startLbl} — ${endLbl}`;
  const el=document.getElementById('main-view');
  el.innerHTML=`<div style="padding:16px 20px"><div class="week-grid">
    <div class="time-col">${['09','10','11','12','13','14','15','16','17'].map(h=>`<div class="time-slot">${h}:00</div>`).join('')}</div>
    ${days.map(d=>{
      const ds=fmtDate(d);
      const dayTasks=S.tasks.filter(t=>t.date===ds&&!t.done);
      const isToday=ds===todayStr;
      return`<div class="week-day-col${isToday?' today-col':''}">
        <div class="week-day-hdr">${['一','二','三','四','五'][d.getDay()-1]||''} ${d.getMonth()+1}/${d.getDate()}</div>
        <div class="week-events">
          ${dayTasks.map(t=>`<div class="week-ev ${t.type==='work'?'week-ev-work':'week-ev-priv'}" onclick="openCalLink(${JSON.stringify(t).replace(/"/g,'&quot;')})">
            <div class="week-ev-time">${t.time||'全天'}${t.timeEnd?' — '+t.timeEnd:''}</div>
            <div class="week-ev-title">${t.title}</div>
            ${t.code?`<div class="week-ev-code">${t.code}</div>`:''}
            ${t.calEventId?`<div class="week-ev-synced">✓ 已同步</div>`:''}
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div></div>`;
}

function renderList(){
  document.getElementById('nav-label').textContent='所有任務';
  const el=document.getElementById('main-view');
  const today=new Date().toISOString().split('T')[0];
  const wt=S.tasks.filter(t=>t.type==='work');
  const pt=S.tasks.filter(t=>t.type==='private');
  let html='<div style="padding:16px 20px">';
  if(!wt.length&&!pt.length){html+=`<div class="empty"><div class="empty-ico">🍊</div>還沒有任務，點上方「新增任務」開始吧！</div>`;el.innerHTML=html+'</div>';return;}
  if(wt.length){
    html+=`<div style="font-size:13px;font-weight:500;color:var(--o6);margin-bottom:12px;display:flex;align-items:center;gap:8px">🏢 公事任務<span style="flex:1;height:1px;background:var(--o4);display:block"></span></div>`;
    S.projects.forEach(p=>{
      const pts=wt.filter(t=>t.code===p.code);
      if(!pts.length)return;
      html+=`<div class="proj-grp"><div class="proj-hdr"><span class="proj-code-tag ${p.code==='0000X'?'warn':''}">${p.code}</span><span class="proj-name-lbl">${p.name}</span></div>${pts.map(t=>cardHTML(t,today)).join('')}</div>`;
    });
    const known=S.projects.map(p=>p.code);
    const unk=wt.filter(t=>!known.includes(t.code));
    if(unk.length)html+=`<div class="proj-grp"><div class="proj-hdr"><span class="proj-code-tag warn">未知代碼</span></div>${unk.map(t=>cardHTML(t,today)).join('')}</div>`;
  }
  if(pt.length){
    html+=`<div style="font-size:13px;font-weight:500;color:var(--g4);margin:16px 0 12px;display:flex;align-items:center;gap:8px">🏠 私人行程<span style="flex:1;height:1px;background:var(--g2);display:block"></span></div>`;
    html+=pt.map(t=>cardHTML(t,today)).join('');
  }
  el.innerHTML=html+'</div>';
}

function cardHTML(t,today){
  const pc={high:'ph',medium:'pm',low:'pl'}[t.priority]||'pm';
  const pl={high:'緊急',medium:'一般',low:'低'}[t.priority]||'一般';
  const overdue=t.date<today&&!t.done;
  return`<div class="task-card ${t.type==='private'?'priv':''} ${t.done?'done':''} ${overdue?'overdue':''}">
    <div class="chk ${t.done?'on '+(t.type==='private'?'gn':''):''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</div>
    <div class="task-body">
      <div class="task-title">${overdue?'<span style="color:var(--red);font-size:10px">逾期 </span>':''}${t.title}</div>
      <div class="task-meta">
        <span class="task-date">${t.date}${t.time?' '+t.time:''}${t.timeEnd?' — '+t.timeEnd:''}</span>
        <span class="prio ${pc}">${pl}</span>
        ${t.code?`<span class="t-code">${t.code}</span>`:''}
        ${t.calEventId?`<span class="synced-badge">✓ 已同步行事曆</span>`:''}
      </div>
    </div>
    <div class="task-actions">
      <button class="t-act-btn" onclick="openCalLink(${JSON.stringify(t).replace(/"/g,'&quot;')})" title="在 Google Calendar 查看">📅</button>
      <button class="t-act-btn del" onclick="delTask(${t.id})" title="刪除">✕</button>
    </div>
  </div>`;
}

function openCalLink(task){
  if(task.calEventId){window.open(`https://calendar.google.com/calendar/r/eventedit/${task.calEventId}`,'_blank');return;}
  const title=encodeURIComponent(task.type==='work'?`[${task.code}] ${task.title}`:task.title);
  const date=task.date.replace(/-/g,'');
  const st=task.time?date+'T'+task.time.replace(':','')+'00':date;
  const et=task.timeEnd?date+'T'+task.timeEnd.replace(':','')+'00':task.time?date+'T'+addH(task.time).replace(':','')+'00':date;
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${st}/${et}`,'_blank');
}

function toggleDone(id){const t=S.tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();renderView();buildSuggestion();}}

async function delTask(id){
  if(!confirm('確定要刪除這個任務嗎？'))return;
  const t=S.tasks.find(t=>t.id===id);
  if(t&&t.calEventId){
    await deleteCal(t.calEventId);
    toast('✅ 任務與行事曆事件已一併刪除','ok');
  }
  S.tasks=S.tasks.filter(t=>t.id!==id);
  save();renderView();buildSuggestion();
}

function buildSuggestion(){
  const el=document.getElementById('sug-txt');
  const today=new Date().toISOString().split('T')[0];
  const pending=S.tasks.filter(t=>!t.done).sort((a,b)=>a.date>b.date?1:-1);
  if(!pending.length){el.textContent='目前沒有待辦任務，好好休息 ☕';return;}
  const overdue=pending.filter(t=>t.date<today);
  const todayT=pending.filter(t=>t.date===today);
  const urgent=pending.filter(t=>t.priority==='high'&&t.date>today);
  let parts=[];
  if(overdue.length)parts.push(`<b style="color:var(--red)">逾期 ${overdue.length} 件</b>請優先處理：${overdue[0].title}`);
  if(todayT.length)parts.push(`今天有 <b>${todayT.length} 件</b>任務，建議先完成：${todayT[0].title}`);
  if(urgent.length)parts.push(`緊急事項：<b>${urgent[0].title}</b>（${urgent[0].date}）`);
  if(!parts.length)parts.push(`待辦共 ${pending.length} 件，下一個截止：<b>${pending[0].title}</b>（${pending[0].date}）`);
  el.innerHTML='<b>今日建議：</b>'+parts.join('；');
}

function openProjModal(){renderProjList();document.getElementById('proj-modal').classList.add('show');}
function renderProjList(){document.getElementById('proj-list').innerHTML=S.projects.map(p=>`
  <div class="proj-item"><span class="proj-code">${p.code}</span><span class="proj-nm">${p.name}</span>
  ${p.code!=='0000X'?`<button class="pdel" onclick="delProj('${p.code}')">✕</button>`:''}</div>`).join('');}
function addProj(){
  const code=document.getElementById('new-code').value.trim().toUpperCase();
  const name=document.getElementById('new-name').value.trim();
  if(!code||!name){toast('請填寫代碼和名稱','err');return;}
  if(!/^\d{4}[A-Z]$/.test(code)){toast('格式：4數字+1大寫英文，例如 1234A','err');return;}
  if(S.projects.find(p=>p.code===code)){toast('此代碼已存在','err');return;}
  S.projects.push({code,name});save();renderProjList();fillCodeSel();
  document.getElementById('new-code').value='';document.getElementById('new-name').value='';
  toast('✅ 案子已新增','ok');
}
function delProj(code){S.projects=S.projects.filter(p=>p.code!==code);save();renderProjList();fillCodeSel();}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function fmtDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className=`toast ${type}`,3000);}

const td=new Date().toISOString().split('T')[0];
if(document.getElementById('w-date'))document.getElementById('w-date').value=td;
if(document.getElementById('p-date'))document.getElementById('p-date').value=td;
</script>

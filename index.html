<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To Do List</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFF8F0;--white:#FFFFFF;--card:#FFFCF8;
  --ora:#F59332;--ora2:#E07820;--ora-bg:#FFF3E0;--ora-mid:#FFD699;
  --border:#EDD9C0;--border2:#D4B896;
  --text:#2C1810;--text2:#6B4226;--text3:#B07850;
  --red:#E53935;--red-bg:#FFF0F0;--red-mid:#FFCDD2;
  --amber:#F59E0B;--amber-bg:#FFFBEB;
  --green:#16A34A;--green-bg:#F0FDF4;--green-mid:#BBF7D0;
  --shadow:0 2px 8px rgba(180,100,30,.10);
  --shadow-md:0 4px 20px rgba(180,100,30,.14);
  --r:14px;--r-sm:10px;--r-xs:8px;
  --max-w:860px;
}
/* 案子色板 */
.cc0{--c:#E53935;--cb:#FFF0F0;--cm:#FFCDD2}
.cc1{--c:#1E88E5;--cb:#E3F2FD;--cm:#BBDEFB}
.cc2{--c:#43A047;--cb:#E8F5E9;--cm:#C8E6C9}
.cc3{--c:#8E24AA;--cb:#F3E5F5;--cm:#E1BEE7}
.cc4{--c:#F4511E;--cb:#FBE9E7;--cm:#FFCCBC}
.cc5{--c:#00897B;--cb:#E0F2F1;--cm:#B2DFDB}
.cc6{--c:#3949AB;--cb:#E8EAF6;--cm:#C5CAE9}
.cc7{--c:#F9A825;--cb:#FFFDE7;--cm:#FFF9C4}
.cc-priv{--c:#FB8C00;--cb:#FFF3E0;--cm:#FFE0B2}

body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.center{max-width:var(--max-w);margin:0 auto;width:100%}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#FFF8F0,#FFF0E0)}
.login-card{background:var(--white);border-radius:24px;padding:48px 40px;box-shadow:var(--shadow-md);max-width:400px;width:100%;text-align:center;border:2px solid var(--ora-mid)}
.login-ico{font-size:52px;margin-bottom:16px}
.login-title{font-size:24px;font-weight:700;color:var(--ora2);margin-bottom:8px}
.login-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:32px}
#login-err{color:var(--red);font-size:13px;margin-top:16px;display:none;padding:10px;background:var(--red-bg);border-radius:10px}

#app{display:none;flex-direction:column;min-height:100vh}

/* HEADER */
.hdr{background:var(--ora);border-bottom:2px solid var(--ora2);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:var(--max-w)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:22px}
.hdr-title{font-size:16px;font-weight:700;color:#fff}
.hdr-right{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.3);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:1.5px solid rgba(255,255,255,.5)}
.hdr-email{font-size:12px;color:rgba(255,255,255,.85);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-btn{background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.pill-btn:hover{background:rgba(255,255,255,.35)}

/* SYNC STATUS */
.sync-bar{background:var(--ora-bg);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;justify-content:center}
.sync-inner{display:flex;align-items:center;gap:8px;max-width:var(--max-w);width:100%}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt{font-size:11px;color:var(--text2)}

/* SUGGESTION */
.sug{background:var(--white);border-bottom:2px solid var(--border);padding:14px 20px;display:flex;justify-content:center}
.sug-inner{display:flex;align-items:flex-start;gap:12px;max-width:var(--max-w);width:100%}
.sug-ico{font-size:20px;flex-shrink:0}
.sug-body{flex:1}
.sug-title{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.sug-txt{font-size:13px;color:var(--text);line-height:1.7}
.sug-txt b{color:var(--red)}
.sug-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.stag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.stag-u{background:var(--red-bg);color:var(--red);border:1px solid var(--red-mid)}
.stag-s{background:var(--amber-bg);color:var(--amber);border:1px solid #FDE68A}
.stag-o{background:var(--green-bg);color:var(--green);border:1px solid var(--green-mid)}
.sug-refresh{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:8px;font-family:inherit;margin-top:6px;display:block}
.sug-refresh:hover{background:var(--border)}

/* HINT */
.hint-bar{background:var(--ora-bg);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;justify-content:center}
.hint-inner{display:flex;align-items:center;gap:10px;max-width:var(--max-w);width:100%}
.hint-txt{font-size:12px;color:var(--text2);flex:1;line-height:1.5}
.hint-copy{font-size:11px;color:var(--ora2);background:var(--white);border:1.5px solid var(--ora-mid);border-radius:20px;padding:4px 12px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.hint-copy:hover{background:var(--ora-bg)}

/* INPUT TOGGLE */
.toggle-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;justify-content:center}
.toggle-btn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ora2);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:10px 0;width:100%;max-width:var(--max-w)}
.t-arrow{font-size:10px;transition:transform .25s;margin-left:auto}
.t-arrow.open{transform:rotate(180deg)}
.input-panel{background:var(--white);border-bottom:2px solid var(--border);overflow:hidden;max-height:0;transition:max-height .3s ease;display:flex;justify-content:center}
.input-panel.open{max-height:560px}
.input-inner{padding:16px 20px;width:100%;max-width:var(--max-w)}
.seg-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.seg{font-size:12px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--text2);font-weight:500;transition:all .15s}
.seg.on{background:var(--ora);color:#fff;border-color:var(--ora)}
.seg:hover:not(.on){background:var(--ora-bg)}
textarea{width:100%;height:100px;border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:10px;font-size:12px;font-family:'JetBrains Mono',monospace;resize:none;outline:none;background:var(--bg);color:var(--text);transition:border .15s}
textarea:focus{border-color:var(--ora)}
textarea::placeholder{font-family:'Noto Sans TC',sans-serif;color:var(--text3)}
.ai-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.ai-btns{display:flex;flex-direction:column;gap:6px}
.man-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
.fld label{font-size:11px;font-weight:500;color:var(--text2)}
.fld input,.fld select{border:1.5px solid var(--border2);border-radius:var(--r-xs);padding:8px 10px;font-size:13px;font-family:inherit;background:var(--white);color:var(--text);outline:none;transition:border .15s}
.fld input:focus,.fld select:focus{border-color:var(--ora)}

/* BUTTONS */
.btn{border:none;border-radius:var(--r-xs);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-ora{background:var(--ora);color:#fff}.btn-ora:hover{background:var(--ora2)}
.btn-grn{background:var(--green);color:#fff}.btn-grn:hover{background:#15803D}
.btn-soft{background:var(--ora-bg);color:var(--text2);border:1.5px solid var(--border2)}.btn-soft:hover{background:var(--border)}
.btn-red{background:var(--red);color:#fff}

/* VIEW BAR */
.view-bar{background:var(--white);border-bottom:2px solid var(--border);padding:0 20px;display:flex;justify-content:center}
.view-bar-inner{display:flex;align-items:center;justify-content:space-between;height:44px;width:100%;max-width:var(--max-w)}
.view-tabs{display:flex;gap:4px}
.vtab{font-size:12px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--text2);font-weight:500;transition:all .15s}
.vtab.on{background:var(--ora);color:#fff;border-color:var(--ora)}
.vtab:hover:not(.on){background:var(--ora-bg)}
.view-nav{display:flex;align-items:center;gap:6px}
.nav-btn{background:var(--ora-bg);border:1.5px solid var(--border2);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2)}
.nav-btn:hover{background:var(--ora-mid)}
.nav-label{font-size:13px;font-weight:500;color:var(--text2);min-width:80px;text-align:center}

/* MAIN */
#main-view{padding:16px 20px;max-width:var(--max-w);margin:0 auto;width:100%}

/* PROJ BLOCK */
.proj-block{border-radius:var(--r);margin-bottom:10px;border:1.5px solid var(--cm);overflow:hidden;box-shadow:var(--shadow)}
.proj-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--cb);transition:filter .15s;user-select:none}
.proj-header:hover{filter:brightness(.97)}
.proj-color-dot{width:10px;height:10px;border-radius:50%;background:var(--c);flex-shrink:0}
.proj-code-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--c);color:#fff;padding:2px 8px;border-radius:6px;font-weight:500}
.proj-name-text{font-size:13px;font-weight:500;flex:1;color:var(--text)}
.proj-stats{display:flex;gap:5px;align-items:center}
.stat-pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.stat-urgent{background:var(--red-bg);color:var(--red)}
.stat-count{background:rgba(255,255,255,.8);color:var(--text2);border:1px solid var(--border)}
.stat-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.proj-arrow{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.proj-arrow.open{transform:rotate(90deg)}
.proj-tasks{display:none;padding:6px 10px 10px}
.proj-tasks.open{display:block}

/* TASK CARD */
.task-card{background:var(--white);border-radius:var(--r-sm);border:1px solid var(--border);padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start;transition:all .15s;border-left:3px solid var(--c)}
.task-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card.priv{border-left-color:#FB8C00}
.task-card.done-card{opacity:.4}
.task-card.done-card .task-title{text-decoration:line-through;color:var(--text3)}
.task-card.overdue-card{border-left-color:var(--red)}
.chk{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:2px;background:none;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent;transition:all .15s}
.chk:hover{border-color:var(--ora)}
.chk.on{background:var(--ora);border-color:var(--ora);color:#fff}
.chk.gn{background:var(--green);border-color:var(--green);color:#fff}
.task-body{flex:1;min-width:0;cursor:pointer}
.task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px;color:var(--text)}
.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.task-date{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.prio{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600}
.ph{background:var(--red-bg);color:var(--red)}
.pm{background:var(--amber-bg);color:var(--amber)}
.pl{background:var(--green-bg);color:var(--green)}
.synced{font-size:10px;color:var(--green);font-weight:500}
.task-acts{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-card:hover .task-acts{opacity:1}
.t-btn{font-size:11px;border:1px solid var(--border);background:var(--bg);border-radius:6px;cursor:pointer;padding:3px 7px;color:var(--text2);font-family:inherit;transition:all .15s}
.t-btn:hover{background:var(--ora);border-color:var(--ora);color:#fff}
.t-btn.del:hover{background:var(--red);border-color:var(--red);color:#fff}

/* TASK DETAIL */
.task-detail{display:none;padding:10px 12px;border-top:1px solid var(--border);background:var(--ora-bg)}
.task-detail.open{display:block}
.detail-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px;letter-spacing:.04em}
.detail-content{font-size:12px;color:var(--text);line-height:1.6;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:8px;white-space:pre-wrap}
.detail-note{width:100%;border:1.5px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit;color:var(--text);outline:none;resize:none;height:60px;background:var(--white)}
.detail-note:focus{border-color:var(--ora)}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.edit-field{display:flex;flex-direction:column;gap:3px}
.edit-field label{font-size:11px;font-weight:500;color:var(--text2)}
.edit-field input,.edit-field select{border:1.5px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:var(--text);outline:none;background:var(--white)}
.edit-field input:focus,.edit-field select:focus{border-color:var(--ora)}

.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.empty-ico{font-size:36px;margin-bottom:10px}

/* WEEK */
.week-wrap{overflow-x:auto}
.week-grid{display:grid;grid-template-columns:44px repeat(5,1fr);gap:4px;min-width:500px}
.time-col{display:flex;flex-direction:column}
.time-slot{height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:6px;font-size:10px;color:var(--text3);padding-top:3px;font-family:'JetBrains Mono',monospace}
.week-day-col{background:var(--white);border-radius:var(--r-sm);border:1.5px solid var(--border);overflow:hidden;min-height:260px}
.week-day-col.today-col{border-color:var(--ora);border-width:2px}
.week-day-hdr{text-align:center;padding:6px 4px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg)}
.week-day-col.today-col .week-day-hdr{color:var(--ora2);background:var(--ora-bg)}
.week-events{padding:4px}
.week-ev{border-radius:6px;padding:4px 6px;margin-bottom:3px;cursor:pointer;border-left:2px solid var(--c);background:var(--cb)}
.week-ev:hover{opacity:.8}
.week-ev.done-ev{opacity:.3;filter:grayscale(1)}
.week-ev-time{font-size:9px;color:var(--text3);margin-bottom:1px;font-family:'JetBrains Mono',monospace}
.week-ev-title{font-size:10px;font-weight:500;line-height:1.3;color:var(--text)}
.week-ev-sub{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.week-ev-synced{font-size:9px;color:var(--green);margin-top:1px}

/* CAL */
.cal-week-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-wday{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{background:var(--white);border-radius:var(--r-xs);padding:5px;min-height:68px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.cal-cell:hover{border-color:var(--ora)}
.cal-cell.today{border-color:var(--ora);border-width:2px}
.cal-cell.other-month{opacity:.35}
.cal-num{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:3px}
.cal-cell.today .cal-num{color:var(--ora);font-weight:700}
.cal-ev-dot{font-size:9px;padding:1px 4px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.cal-ev-dot.done-dot{opacity:.3;filter:grayscale(1)}
.cal-ev-dot.span-dot{border-radius:0;margin-left:-5px;margin-right:-5px;padding-left:6px}
.cal-ev-dot.span-start{border-radius:5px 0 0 5px;margin-right:-5px;padding-right:6px}
.cal-ev-dot.span-end{border-radius:0 5px 5px 0;margin-left:-5px;padding-left:6px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(80,30,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md);border:2px solid var(--ora-mid)}
.modal-title{font-size:16px;font-weight:700;color:var(--ora2);margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.parsed-item{background:var(--bg);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;border:1.5px solid var(--border)}
.pi-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:600}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fi label{font-size:11px;font-weight:500;color:var(--text2)}
.fi input,.fi select{border:1.5px solid var(--border2);border-radius:var(--r-xs);padding:7px 9px;font-size:12px;font-family:inherit;background:var(--white);color:var(--text);outline:none;width:100%}
.fi input:focus,.fi select:focus{border-color:var(--ora)}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.warn-sel{border-color:var(--red)!important}
.proj-item-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.proj-code-s{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 8px;border-radius:6px;color:#fff;flex-shrink:0}
.proj-nm{flex:1;color:var(--text2)}
.proj-edit-btn{color:var(--text3);background:none;border:none;cursor:pointer;padding:3px 8px;font-size:12px;border-radius:6px;font-family:inherit}
.proj-edit-btn:hover{color:var(--ora2);background:var(--ora-bg)}
.pdel{color:var(--text3);background:none;border:none;cursor:pointer;padding:3px 8px;font-size:13px;border-radius:6px}
.pdel:hover{color:var(--red);background:var(--red-bg)}
.proj-edit-row{display:flex;gap:6px;margin-top:4px;margin-bottom:8px;padding:8px;background:var(--ora-bg);border-radius:8px;border:1px solid var(--border)}
.proj-edit-row input{flex:1;border:1.5px solid var(--border2);border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;color:var(--text);outline:none;background:var(--white)}
.proj-edit-row input:focus{border-color:var(--ora)}
.padd-row{display:flex;gap:8px;margin-top:12px}
.padd-row input{flex:1;border:1.5px solid var(--border2);border-radius:var(--r-xs);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;background:var(--white)}
.padd-row input:focus{border-color:var(--ora)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:20px;padding:10px 18px;border-radius:12px;font-size:13px;z-index:999;opacity:0;transform:translateY(60px);transition:all .3s;pointer-events:none;font-weight:500}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#15803D;color:#fff}
.toast.err{background:#B91C1C;color:#fff}
.toast.info{background:var(--ora2);color:#fff}

async function loadFromFirebase(){

      saveLocal();
      renderView();buildSuggestion();
      setSyncStatus('ok','已同步 ✓');
      resolve();
    });
    // 即時監聽 projects
    db.ref('cyy321_todo_9x7k/projects').on('value',snap=>{
      if(snap.exists()){
        const loaded=Object.values(snap.val());

          S.projects=loaded;
          localStorage.setItem('tm-projs',JSON.stringify(S.projects));

// ── PARSE ──
function parsePaste(){
  const text=document.getElementById('paste-box').value.trim();
  if(!text){toast('請先貼上內容','err');return;}
  const blocks=text.split(/\n?---\n?/).filter(b=>b.trim());
  const tasks=[];
  blocks.forEach(block=>{
    const get=keys=>{for(const k of keys){const m=block.match(new RegExp(k+'[：:]\\s*(.+)','i'));if(m)return m[1].trim();}return '';};
    const title=get(['任務名稱','行程名稱','名稱','title']);
    if(!title)return;
    const typeRaw=get(['類型','type']);
    const codeRaw=get(['計畫代碼','代碼','code']);
    const dateRaw=get(['開始日期','截止日期','日期','date']);
    const edateRaw=get(['結束日期','end.?date','enddate']);
    const startRaw=get(['開始時間','time','start']);
    const endRaw=get(['結束時間','end']);
    const prioRaw=get(['優先級','優先','priority']);
    const note=get(['說明','備註','note']);
    const type=(typeRaw.includes('私人')||typeRaw.toLowerCase()==='private')?'private':'work';
    const codeFromField=codeRaw?codeRaw.match(/\d{4}[A-Z]/):null;
    const codeFromBlock=block.match(/\d{4}[A-Z]/);
    const codeMatch=codeFromField||codeFromBlock;
    const code=type==='work'?(codeMatch?codeMatch[0]:'0000X'):null;
    const dateMatch=(dateRaw||'').match(/\d{4}-\d{2}-\d{2}/);
    const edateMatch=(edateRaw||'').match(/\d{4}-\d{2}-\d{2}/);
    const date=dateMatch?dateMatch[0]:new Date().toISOString().split('T')[0];
    const endDate=edateMatch?edateMatch[0]:null;
    const startMatch=(startRaw||'').match(/\d{1,2}:\d{2}/);
    const endMatch=(endRaw||'').match(/\d{1,2}:\d{2}/);
    const prioMap={'高':'high','中':'medium','低':'low','緊急':'high'};
    tasks.push({title,type,code,date,endDate,time:startMatch?startMatch[0]:null,timeEnd:endMatch?endMatch[0]:null,priority:prioMap[prioRaw]||'medium',note,rawBlock:block});
  });
  if(!tasks.length){toast('找不到任務格式，請確認內容','err');return;}
  S.pending=tasks;showConfirmModal();
}

    ${opts.replace(`value="${t.code}"`,`value="${t.code}" selected`)}</select></div>`:''}

      <div class="fi"><label>結束時間</label><input type="time" value="${t.timeEnd||''}" id="pt${i}-end"></div>
    </div>
    <div class="fi"><label>優先級</label><select id="pt${i}-prio">
      <option value="high" ${t.priority==='high'?'selected':''}>🔴 緊急</option>
      <option value="medium" ${t.priority==='medium'?'selected':''}>🟡 一般</option>
      <option value="low" ${t.priority==='low'?'selected':''}>🟢 低</option>

async function commitTasks(){
  const newT=[];
  for(let i=0;i<S.pending.length;i++){
    const t=S.pending[i];
    const title=document.getElementById(`pt${i}-title`).value.trim();
    const date=document.getElementById(`pt${i}-date`).value;
    const edate=document.getElementById(`pt${i}-edate`).value||null;
    const start=document.getElementById(`pt${i}-start`)?.value||null;
    const end=document.getElementById(`pt${i}-end`)?.value||null;
    const code=t.type==='work'?(document.getElementById(`pt${i}-code`)?.value||'0000X'):null;
    const prio=document.getElementById(`pt${i}-prio`).value;
    if(!title||!date){toast('請填寫所有必填欄位','err');return;}
    const task={id:Date.now()+i,type:t.type,title,code,date,endDate:edate,time:start,timeEnd:end,loc:'',priority:prio,done:false,calEventId:null,note:t.note||'',rawInfo:t.rawBlock||'',createdAt:Date.now()};
    const evId=await pushCal(task);if(evId)task.calEventId=evId;
    newT.push(task);
  }
  S.tasks.push(...newT);await save();
  closeModal('confirm-modal');
  document.getElementById('paste-box').value='';
  renderView();buildSuggestion();
  toast(`✅ 已新增 ${newT.length} 個任務`,'ok');
}

// ── CALENDAR API ──
async function pushCal(task){
  if(!S.calToken)return null;
  const hasEndDate=task.endDate&&task.endDate!==task.date;
  let evStart,evEnd;
  if(hasEndDate){
    evStart={date:task.date};
    const ed=new Date(task.endDate+'T00:00:00');ed.setDate(ed.getDate()+1);
    evEnd={date:fmtDate(ed)};
  }else{
    const st=task.time||'09:00';
    const et=task.timeEnd||addH(st);
    evStart={dateTime:`${task.date}T${st}:00`,timeZone:'Asia/Taipei'};
    evEnd={dateTime:`${task.date}T${et}:00`,timeZone:'Asia/Taipei'};
  }
  const ev={summary:task.type==='work'?`[${task.code}] ${task.title}`:task.title,start:evStart,end:evEnd,colorId:task.type==='work'?'9':'6',location:task.loc||undefined,description:task.note||undefined};
  try{
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{'Authorization':`Bearer ${S.calToken}`,'Content-Type':'application/json'},body:JSON.stringify(ev)});
    const d=await r.json();return d.id||null;
  }catch(e){console.error(e);return null;}
}

async function deleteCal(eventId){
  if(!S.calToken||!eventId)return;
  try{await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`,{method:'DELETE',headers:{'Authorization':`Bearer ${S.calToken}`}});}
  catch(e){console.error(e);}
}

// ── VIEW ──
function setView(v){S.view=v;['list','week','cal'].forEach(x=>document.getElementById('vt-'+x).className='vtab'+(x===v?' on':''));renderView();}
function navPrev(){if(S.view==='cal'){S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}}else if(S.view==='week'){S.weekOffset--;}renderView();}
function navNext(){if(S.view==='cal'){S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}}else if(S.view==='week'){S.weekOffset++;}renderView();}
function renderView(){fillCodeSel();if(S.view==='list')renderList();else if(S.view==='week')renderWeek();else renderCal();}

// 展開任務的日期範圍
function getTaskDates(task){
  if(!task.endDate||task.endDate===task.date)return[task.date];
  const dates=[];const cur=new Date(task.date+'T00:00:00');const end=new Date(task.endDate+'T00:00:00');
  while(cur<=end){dates.push(fmtDate(cur));cur.setDate(cur.getDate()+1);}
  return dates;
}

    <div class="time-col">${['09','10','11','12','13','14','15','16','17'].map(h=>`<div class="time-slot">${h}:00</div>`).join('')}</div>
    ${days.map(d=>{
      const ds=fmtDate(d);
      const dayTasks=S.tasks.filter(t=>getTaskDates(t).includes(ds)).sort((a,b)=>a.done===b.done?0:a.done?1:-1);

  </div></div>`;
}

// ── CAL ──
function renderCal(){
  const mn=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const today=fmtDate(new Date());

  // Build two months
  const months=[];
  for(let m=0;m<2;m++){
    let yr=S.calYear, mo=S.calMonth+m;
    if(mo>11){mo-=12;yr++;}
    months.push({yr,mo});
  }
  document.getElementById('nav-label').textContent=`${months[0].yr}/${mn[months[0].mo]} — ${mn[months[1].mo]}`;

  function buildMonthHTML(yr,mo){
    const first=new Date(yr,mo,1);
    const last=new Date(yr,mo+1,0);
    let startDay=first.getDay()-1;if(startDay<0)startDay=6;
    let cells=[];
    for(let i=0;i<startDay;i++){const d=new Date(yr,mo,1-startDay+i);cells.push({date:fmtDate(d),other:true});}
    for(let d=1;d<=last.getDate();d++)cells.push({date:`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,other:false});
    while(cells.length%7!==0)cells.push({date:'',other:true});

    return `
    <div style="margin-bottom:20px">
      <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;text-align:center">${yr} ${mn[mo]}</div>
      <div class="cal-week-hdr">${['一','二','三','四','五','六','日'].map(d=>`<div class="cal-wday">${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells.map(c=>{
        if(!c.date)return`<div class="cal-cell other-month"></div>`;
        const dayTasks=S.tasks.filter(t=>getTaskDates(t).includes(c.date));
        const isToday=c.date===today;
        return`<div class="cal-cell${c.other?' other-month':''}${isToday?' today':''}">
          <div class="cal-num">${parseInt(c.date.split('-')[2])}</div>
          ${dayTasks.slice(0,2).map(t=>{
            const c2=cHex(t.type==='private'?null:t.code);
            const cm2=cMid(t.type==='private'?null:t.code);
            const dates=getTaskDates(t);
            const isSpan=dates.length>1;
            const isFirst=c.date===dates[0];
            const spanClass=isSpan?(isFirst?'span-start':'span-dot'):'';
            return`<div class="cal-ev-dot ${spanClass} ${t.done?'done-dot':''}" style="background:${cm2};color:${c2}" title="${t.title}">${isFirst||!isSpan?t.title.substring(0,6)+(t.title.length>6?'…':''):'↔'}</div>`;
          }).join('')}
          ${dayTasks.length>2?`<div style="font-size:9px;color:var(--text3)">+${dayTasks.length-2}</div>`:''}
        </div>`;
      }).join('')}</div>
    </div>`;
  }

  const el=document.getElementById('main-view');
  el.innerHTML=months.map(m=>buildMonthHTML(m.yr,m.mo)).join('');
}

function openCalLink(task){
  if(task.calEventId){window.open(`https://calendar.google.com/calendar/r/eventedit/${task.calEventId}`,'_blank');return;}
  const title=encodeURIComponent(task.type==='work'?`[${task.code}] ${task.title}`:task.title);
  const date=task.date.replace(/-/g,'');
  const st=task.time?date+'T'+task.time.replace(':','')+'00':date;
  const et=task.timeEnd?date+'T'+task.timeEnd.replace(':','')+'00':task.time?date+'T'+addH(task.time).replace(':','')+'00':date;
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${st}/${et}`,'_blank');
}

// ── SUGGESTION ──
function buildSuggestion(){
  const el=document.getElementById('sug-txt');
  const tags=document.getElementById('sug-tags');
  const today=fmtDate(new Date());
  const pending=S.tasks.filter(t=>!t.done).sort((a,b)=>a.date>b.date?1:-1);
  if(!pending.length){el.textContent='目前沒有待辦任務，好好休息 ☕';tags.innerHTML='';return;}
  const overdue=pending.filter(t=>t.date<today);
  const todayT=pending.filter(t=>t.date===today);
  const thisWeek=pending.filter(t=>{const diff=(new Date(t.date)-new Date())/86400000;return diff>=0&&diff<=7;});
  const urgent=pending.filter(t=>t.priority==='high');
  let parts=[];
  if(overdue.length)parts.push(`<b style="color:var(--red)">逾期 ${overdue.length} 件</b>，請優先處理：${overdue.map(t=>t.title).slice(0,2).join('、')}`);
  if(todayT.length)parts.push(`今天有 <b>${todayT.length} 件</b>任務：${todayT.map(t=>t.title).slice(0,2).join('、')}`);
  else if(urgent.length&&!overdue.length)parts.push(`緊急事項：<b>${urgent[0].title}</b>（${urgent[0].date}）`);
  if(!parts.length)parts.push(`下一個截止：<b>${pending[0].title}</b>（${pending[0].date}）`);
  el.innerHTML=parts.join('<br>');
  let tagHtml='';
  if(overdue.length)tagHtml+=`<span class="stag stag-u">逾期 ${overdue.length} 件</span>`;
  if(todayT.length)tagHtml+=`<span class="stag stag-s">今天 ${todayT.length} 件</span>`;
  if(thisWeek.length)tagHtml+=`<span class="stag stag-o">本週 ${thisWeek.length} 件</span>`;
  tags.innerHTML=tagHtml;
}

// ── PROJ MANAGER ──
function openProjModal(){S.editingProj=null;renderProjList();document.getElementById('proj-modal').classList.add('show');}
function renderProjList(){
  document.getElementById('proj-list').innerHTML=S.projects.map((p,idx)=>{
    const c=p.code==='0000X'?'#aaa':cHex(p.code);
    const isEditing=S.editingProj===p.code;
    return`<div>
      <div class="proj-item-row">
        <span class="proj-code-s" style="background:${c}">${p.code}</span>
        <span class="proj-nm">${p.name}</span>
        ${p.code!=='0000X'?`<button class="proj-edit-btn" onclick="startProjEdit('${p.code}')">✏️ 編輯</button>
        <button class="pdel" onclick="delProj('${p.code}')">✕</button>`:''}
      </div>
      ${isEditing?`<div class="proj-edit-row">
        <input type="text" id="pe-code" value="${p.code}" maxlength="5" style="max-width:80px;font-family:'JetBrains Mono',monospace;text-transform:uppercase">
        <input type="text" id="pe-name" value="${p.name}">
        <button class="btn btn-ora" onclick="saveProjEdit('${p.code}')" style="font-size:12px;padding:6px 12px">儲存</button>
        <button class="btn btn-soft" onclick="cancelProjEdit()" style="font-size:12px;padding:6px 12px">取消</button>
      </div>`:''}
    </div>`;
  }).join('');
}
function startProjEdit(code){S.editingProj=code;renderProjList();}
function cancelProjEdit(){S.editingProj=null;renderProjList();}
async function saveProjEdit(oldCode){
  const newCode=document.getElementById('pe-code').value.trim().toUpperCase();
  const newName=document.getElementById('pe-name').value.trim();
  if(!newCode||!newName){toast('請填寫代碼和名稱','err');return;}
  if(!/^\d{4}[A-Z]$/.test(newCode)){toast('格式：4數字+1大寫英文，例如 1234A','err');return;}
  if(newCode!==oldCode&&S.projects.find(p=>p.code===newCode)){toast('此代碼已存在','err');return;}
  const p=S.projects.find(p=>p.code===oldCode);if(!p)return;
  p.code=newCode;p.name=newName;
  if(newCode!==oldCode){S.tasks.forEach(t=>{if(t.code===oldCode)t.code=newCode;});if(colorMap[oldCode]!==undefined){colorMap[newCode]=colorMap[oldCode];delete colorMap[oldCode];}}
  S.editingProj=null;saveLocal();await saveProjectsToFirebase();await saveTasksToFirebase();renderProjList();fillCodeSel();renderView();
  toast('✅ 案子已更新','ok');
}
async function addProj(){
  const code=document.getElementById('new-code').value.trim().toUpperCase();
  const name=document.getElementById('new-name').value.trim();
  if(!code||!name){toast('請填寫代碼和名稱','err');return;}
  if(!/^\d{4}[A-Z]$/.test(code)){toast('格式：4數字+1大寫英文，例如 1234A','err');return;}
  if(S.projects.find(p=>p.code===code)){toast('此代碼已存在','err');return;}
  S.projects.push({code,name});getCI(code);saveLocal();await saveProjectsToFirebase();renderProjList();fillCodeSel();
  document.getElementById('new-code').value='';document.getElementById('new-name').value='';
  toast('✅ 案子已新增','ok');
}
async function delProj(code){
  S.projects=S.projects.filter(p=>p.code!==code);
  saveLocal();await saveProjectsToFirebase();renderProjList();fillCodeSel();
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
async function refreshData(){
  if(!db){toast('尚未連線','err');return;}
  setSyncStatus('syncing','重新整理中…');
  // Firebase 即時監聽已自動同步，這裡只需要重新渲染
  S.projects.forEach(p=>{if(p.code!=='0000X')getCI(p.code);});
  fillCodeSel();renderView();buildSuggestion();
  setSyncStatus('ok','已同步 ✓');
  toast('✅ 已重新整理','ok');
}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className=`toast ${type}`,3000);}
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To Do List</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAFA;--white:#FFFFFF;
  --border:#E8E8E8;--border2:#D0D0D0;
  --text:#1A1A1A;--text2:#555;--text3:#999;
  --red:#E53935;--red-bg:#FFF0F0;
  --amber:#F59E0B;--amber-bg:#FFFBEB;
  --green:#16A34A;--green-bg:#F0FDF4;
  --shadow:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);
  --r:14px;--r-sm:10px;--r-xs:8px;
}
/* 案子貼紙色板 */
.color-0{--c:#E53935;--cb:#FFF0F0;--cm:#FFCDD2}
.color-1{--c:#1E88E5;--cb:#E3F2FD;--cm:#BBDEFB}
.color-2{--c:#43A047;--cb:#E8F5E9;--cm:#C8E6C9}
.color-3{--c:#8E24AA;--cb:#F3E5F5;--cm:#E1BEE7}
.color-4{--c:#F4511E;--cb:#FBE9E7;--cm:#FFCCBC}
.color-5{--c:#00897B;--cb:#E0F2F1;--cm:#B2DFDB}
.color-6{--c:#3949AB;--cb:#E8EAF6;--cm:#C5CAE9}
.color-7{--c:#F9A825;--cb:#FFFDE7;--cm:#FFF9C4}
.color-priv{--c:#FB8C00;--cb:#FFF3E0;--cm:#FFE0B2}

body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#FFF8F0,#F0F4FF)}
.login-card{background:var(--white);border-radius:24px;padding:48px 40px;box-shadow:var(--shadow-md);max-width:400px;width:100%;text-align:center;border:1px solid var(--border)}
.login-ico{font-size:48px;margin-bottom:16px}
.login-title{font-size:24px;font-weight:700;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:32px}
#login-err{color:var(--red);font-size:13px;margin-top:16px;display:none;padding:10px;background:var(--red-bg);border-radius:10px}

#app{display:none;flex-direction:column;min-height:100vh}

/* HEADER */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:20px}
.hdr-title{font-size:15px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:#1E88E5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.hdr-email{font-size:12px;color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-btn{background:var(--bg);color:var(--text2);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.pill-btn:hover{background:var(--border);color:var(--text)}

/* SUGGESTION */
.sug{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:flex-start;gap:12px}
.sug-ico{font-size:20px;flex-shrink:0}
.sug-body{flex:1}
.sug-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.04em}
.sug-txt{font-size:13px;color:var(--text);line-height:1.7}
.sug-txt b{color:var(--red)}
.sug-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.sug-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid var(--border)}
.sug-tag.urgent{background:var(--red-bg);color:var(--red);border-color:#FFCDD2}
.sug-tag.soon{background:var(--amber-bg);color:var(--amber);border-color:#FDE68A}
.sug-tag.ok{background:var(--green-bg);color:var(--green);border-color:#BBF7D0}
.sug-refresh{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:8px;font-family:inherit;margin-top:8px;display:block}
.sug-refresh:hover{background:var(--border)}

/* HINT */
.hint-bar{background:#F0F4FF;border-bottom:1px solid #C5CAE9;padding:8px 20px;display:flex;align-items:center;gap:10px}
.hint-txt{font-size:12px;color:#3949AB;flex:1;line-height:1.5}
.hint-copy{font-size:11px;color:#3949AB;background:var(--white);border:1px solid #C5CAE9;border-radius:20px;padding:4px 12px;cursor:pointer;font-family:inherit;font-weight:500}
.hint-copy:hover{background:#E8EAF6}

/* INPUT TOGGLE */
.toggle-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px}
.toggle-btn{display:flex;align-items:center;gap:8px;font-size:13px;color:#1E88E5;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:10px 0;width:100%}
.t-arrow{font-size:10px;transition:transform .25s;margin-left:auto}
.t-arrow.open{transform:rotate(180deg)}
.input-panel{background:var(--white);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .3s ease}
.input-panel.open{max-height:520px}
.input-inner{padding:16px 20px}
.seg-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.seg{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--text2);font-weight:500;transition:all .15s}
.seg.on{background:#1E88E5;color:#fff;border-color:#1E88E5}
.seg:hover:not(.on){background:var(--border)}
textarea{width:100%;height:100px;border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px;font-size:12px;font-family:'JetBrains Mono',monospace;resize:none;outline:none;background:var(--bg);color:var(--text);transition:border .15s}
textarea:focus{border-color:#1E88E5}
textarea::placeholder{font-family:'Noto Sans TC',sans-serif;color:var(--text3)}
.ai-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.ai-btns{display:flex;flex-direction:column;gap:6px}
.man-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
.fld label{font-size:11px;font-weight:500;color:var(--text2)}
.fld input,.fld select{border:1px solid var(--border2);border-radius:var(--r-xs);padding:8px 10px;font-size:13px;font-family:inherit;background:var(--white);color:var(--text);outline:none;transition:border .15s}
.fld input:focus,.fld select:focus{border-color:#1E88E5}

/* BUTTONS */
.btn{border:none;border-radius:var(--r-xs);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-blue{background:#1E88E5;color:#fff}.btn-blue:hover{background:#1565C0}
.btn-grn{background:#16A34A;color:#fff}.btn-grn:hover{background:#15803D}
.btn-soft{background:var(--bg);color:var(--text2);border:1px solid var(--border2)}.btn-soft:hover{background:var(--border)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#C62828}

/* VIEW BAR */
.view-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:44px}
.view-tabs{display:flex;gap:4px}
.vtab{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--text2);font-weight:500;transition:all .15s}
.vtab.on{background:#1E88E5;color:#fff;border-color:#1E88E5}
.vtab:hover:not(.on){background:var(--border)}
.view-nav{display:flex;align-items:center;gap:6px}
.nav-btn{background:var(--bg);border:1px solid var(--border2);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2)}
.nav-btn:hover{background:var(--border)}
.nav-label{font-size:13px;font-weight:500;min-width:80px;text-align:center}

#main-view{padding:16px 20px}

/* ── KANBAN / LIST ── */
.proj-block{border-radius:var(--r);margin-bottom:10px;border:1.5px solid var(--cm);overflow:hidden;box-shadow:var(--shadow)}
.proj-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--cb);transition:filter .15s;user-select:none}
.proj-header:hover{filter:brightness(.97)}
.proj-color-dot{width:10px;height:10px;border-radius:50%;background:var(--c);flex-shrink:0}
.proj-code-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--c);color:#fff;padding:2px 8px;border-radius:6px;font-weight:500}
.proj-name-text{font-size:13px;font-weight:500;flex:1;color:var(--text)}
.proj-stats{display:flex;gap:6px;align-items:center}
.stat-pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.stat-urgent{background:var(--red-bg);color:var(--red)}
.stat-count{background:var(--white);color:var(--text2);border:1px solid var(--border)}
.stat-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.proj-arrow{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.proj-arrow.open{transform:rotate(90deg)}
.proj-tasks{display:none;padding:6px 10px 10px}
.proj-tasks.open{display:block}

/* TASK CARD */
.task-card{background:var(--white);border-radius:var(--r-sm);border:1px solid var(--border);padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start;transition:all .15s;border-left:3px solid var(--c)}
.task-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card.priv{border-left-color:#FB8C00}
.task-card.done-card{opacity:.4}
.task-card.done-card .task-title{text-decoration:line-through;color:var(--text3)}
.task-card.overdue-card{border-left-color:var(--red)}
.chk{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:2px;background:none;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent;transition:all .15s}
.chk:hover{border-color:#1E88E5}
.chk.on{background:#1E88E5;border-color:#1E88E5;color:#fff}
.chk.gn{background:var(--green);border-color:var(--green);color:#fff}
.task-body{flex:1;min-width:0;cursor:pointer}
.task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px}
.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.task-date{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.prio{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600}
.ph{background:var(--red-bg);color:var(--red)}
.pm{background:var(--amber-bg);color:var(--amber)}
.pl{background:var(--green-bg);color:var(--green)}
.synced{font-size:10px;color:var(--green);font-weight:500}
.task-acts{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-card:hover .task-acts{opacity:1}
.t-btn{font-size:11px;border:1px solid var(--border);background:var(--bg);border-radius:6px;cursor:pointer;padding:3px 7px;color:var(--text2);font-family:inherit;transition:all .15s}
.t-btn:hover{background:#1E88E5;border-color:#1E88E5;color:#fff}
.t-btn.del:hover{background:var(--red);border-color:var(--red);color:#fff}

/* TASK DETAIL */
.task-detail{display:none;padding:10px 12px;border-top:1px solid var(--border);background:#FAFAFA}
.task-detail.open{display:block}
.detail-section{margin-bottom:10px}
.detail-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;letter-spacing:.04em}
.detail-content{font-size:12px;color:var(--text);line-height:1.6;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.detail-note{width:100%;border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit;color:var(--text);outline:none;resize:none;height:60px;background:var(--white)}
.detail-note:focus{border-color:#1E88E5}
.edit-form{display:none}
.edit-form.open{display:block}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.edit-field{display:flex;flex-direction:column;gap:3px}
.edit-field label{font-size:11px;font-weight:500;color:var(--text2)}
.edit-field input,.edit-field select{border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:var(--text);outline:none;background:var(--white)}
.edit-field input:focus,.edit-field select:focus{border-color:#1E88E5}

.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.empty-ico{font-size:36px;margin-bottom:10px}

/* WEEK VIEW */
.week-wrap{overflow-x:auto}
.week-grid{display:grid;grid-template-columns:44px repeat(5,1fr);gap:4px;min-width:500px}
.time-col{display:flex;flex-direction:column}
.time-slot{height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:6px;font-size:10px;color:var(--text3);padding-top:3px;font-family:'JetBrains Mono',monospace}
.week-day-col{background:var(--white);border-radius:var(--r-sm);border:1px solid var(--border);overflow:hidden;min-height:260px}
.week-day-col.today-col{border-color:#1E88E5;border-width:2px}
.week-day-hdr{text-align:center;padding:6px 4px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg)}
.week-day-col.today-col .week-day-hdr{color:#1E88E5;background:#E3F2FD}
.week-events{padding:4px}
.week-ev{border-radius:6px;padding:4px 6px;margin-bottom:3px;cursor:pointer;transition:opacity .15s;border-left:2px solid var(--c)}
.week-ev:hover{opacity:.8}
.week-ev-time{font-size:9px;color:var(--text3);margin-bottom:1px;font-family:'JetBrains Mono',monospace}
.week-ev-title{font-size:10px;font-weight:500;line-height:1.3;color:var(--text)}
.week-ev-code{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.week-ev-synced{font-size:9px;color:var(--green);margin-top:1px}
.week-ev.done-ev{opacity:.3}

/* CALENDAR */
.cal-week-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-wday{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{background:var(--white);border-radius:var(--r-xs);padding:5px;min-height:68px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.cal-cell:hover{background:var(--bg);border-color:#1E88E5}
.cal-cell.today{border-color:#1E88E5;border-width:2px}
.cal-cell.other-month{opacity:.35}
.cal-num{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:3px}
.cal-cell.today .cal-num{color:#1E88E5;font-weight:700}
.cal-ev-dot{font-size:9px;padding:1px 4px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;background:var(--cm);color:var(--c)}
.cal-ev-dot.done-dot{opacity:.35;filter:grayscale(1)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.parsed-item{background:var(--bg);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.pi-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:600}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fi label{font-size:11px;font-weight:500;color:var(--text2)}
.fi input,.fi select{border:1px solid var(--border2);border-radius:var(--r-xs);padding:7px 9px;font-size:12px;font-family:inherit;background:var(--white);color:var(--text);outline:none;width:100%}
.fi input:focus,.fi select:focus{border-color:#1E88E5}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.warn-sel{border-color:var(--red)!important}
.proj-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.proj-code-s{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 8px;border-radius:6px;color:#fff}
.proj-nm{flex:1;color:var(--text2)}
.pdel{color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;font-size:14px;border-radius:6px}
.pdel:hover{color:var(--red);background:var(--red-bg)}
.padd-row{display:flex;gap:8px;margin-top:12px}
.padd-row input{flex:1;border:1px solid var(--border2);border-radius:var(--r-xs);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;background:var(--white)}
.padd-row input:focus{border-color:#1E88E5}

/* TOAST */
.toast{position:fixed;bottom:24px;right:20px;padding:10px 18px;border-radius:12px;font-size:13px;z-index:999;opacity:0;transform:translateY(60px);transition:all .3s;pointer-events:none;font-weight:500}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#15803D;color:#fff}
.toast.err{background:#B91C1C;color:#fff}
.toast.info{background:#1E3A5F;color:#fff}

.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-ico">🍊</div>
    <div class="login-title">My To Do List</div>
    <div class="login-sub">整理公事與私人行程，同步 Google Calendar。<br>請使用指定 Google 帳號登入。</div>
    <div id="g-btn" style="display:flex;justify-content:center"></div>
    <div id="login-err">❌ 此帳號無使用權限</div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <span class="hdr-logo">🍊</span>
      <span class="hdr-title">My To Do List</span>
    </div>
    <div class="hdr-right">
      <div class="avatar" id="u-av">U</div>
      <span class="hdr-email" id="u-em"></span>
      <button class="pill-btn" onclick="openProjModal()">⚙ 管理案子</button>
    </div>
  </div>

  <div class="sug">
    <span class="sug-ico">✨</span>
    <div class="sug-body">
      <div class="sug-title">今日建議</div>
      <div class="sug-txt" id="sug-txt"><span style="color:var(--text3);font-style:italic">分析中…</span></div>
      <div class="sug-actions" id="sug-tags"></div>
      <button class="sug-refresh" onclick="buildSuggestion()">↻ 重新分析</button>
    </div>
  </div>

  <div class="hint-bar">
    <span style="font-size:15px">💡</span>
    <div class="hint-txt">用 Claude 整理信件或 Line 訊息後，把結果貼到下方匯入。</div>
    <button class="hint-copy" onclick="copyPrompt()">複製 Claude 提示詞</button>
  </div>

  <div class="toggle-bar">
    <button class="toggle-btn" onclick="toggleInput()">
      ＋ 新增任務 / 匯入整理結果
      <span class="t-arrow" id="t-arrow">▼</span>
    </button>
  </div>

  <div class="input-panel" id="input-panel">
    <div class="input-inner">
      <div class="seg-tabs">
        <button class="seg on" id="it-paste" onclick="setITab('paste')">📋 貼上 Claude 整理結果</button>
        <button class="seg" id="it-work" onclick="setITab('work')">🏢 手動新增公事</button>
        <button class="seg" id="it-priv" onclick="setITab('priv')">🏠 手動新增私人行程</button>
      </div>
      <div id="area-paste">
        <div style="background:var(--bg);border-radius:var(--r-sm);padding:14px;border:1px solid var(--border2)">

// PARSE
function parsePaste(){
  const text=document.getElementById('paste-box').value.trim();
  if(!text){toast('請先貼上內容','err');return;}
  const blocks=text.split(/\n?---\n?/).filter(b=>b.trim());
  const tasks=[];
  blocks.forEach(block=>{
    const get=keys=>{for(const k of keys){const m=block.match(new RegExp(k+'[：:]\\s*(.+)','i'));if(m)return m[1].trim();}return '';};
    const title=get(['任務名稱','行程名稱','名稱','title']);
    if(!title)return;
    const typeRaw=get(['類型','type']);
    const codeRaw=get(['計畫代碼','代碼','code']);
    const dateRaw=get(['截止日期','日期','date']);
    const startRaw=get(['開始時間','time','start']);
    const endRaw=get(['結束時間','end']);
    const prioRaw=get(['優先級','優先','priority']);
    const note=get(['說明','備註','note','description']);
    const type=(typeRaw.includes('私人')||typeRaw.toLowerCase()==='private')?'private':'work';
    const codeFromField=codeRaw?codeRaw.match(/\d{4}[A-Z]/):null;
    const codeFromBlock=block.match(/\d{4}[A-Z]/);
    const codeMatch=codeFromField||codeFromBlock;
    const code=type==='work'?(codeMatch?codeMatch[0]:'0000X'):null;
    const dateMatch=(dateRaw||'').match(/\d{4}-\d{2}-\d{2}/);
    const date=dateMatch?dateMatch[0]:new Date().toISOString().split('T')[0];
    const startMatch=(startRaw||'').match(/\d{1,2}:\d{2}/);
    const endMatch=(endRaw||'').match(/\d{1,2}:\d{2}/);
    const prioMap={'高':'high','中':'medium','低':'low','緊急':'high'};
    tasks.push({title,type,code,date,time:startMatch?startMatch[0]:null,timeEnd:endMatch?endMatch[0]:null,priority:prioMap[prioRaw]||'medium',note,rawBlock:block});
  });
  if(!tasks.length){toast('找不到任務格式，請確認內容','err');return;}
  S.pending=tasks;showConfirmModal();
}

async function commitTasks(){

async function pushCal(task){
  if(!S.calToken)return null;
  const st=task.time||'09:00';
  const et=task.timeEnd||addH(st);
  const ev={
    summary:task.type==='work'?`[${task.code}] ${task.title}`:task.title,
    start:{dateTime:`${task.date}T${st}:00`,timeZone:'Asia/Taipei'},
    end:{dateTime:`${task.date}T${et}:00`,timeZone:'Asia/Taipei'},
    colorId:task.type==='work'?'9':'6',
    location:task.loc||undefined,
    description:task.note||undefined,
  };
  try{
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',headers:{'Authorization':`Bearer ${S.calToken}`,'Content-Type':'application/json'},body:JSON.stringify(ev),
    });
    const d=await r.json();return d.id||null;
  }catch(e){console.error(e);return null;}
}

async function deleteCal(eventId){
  if(!S.calToken||!eventId)return;
  try{await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`,{method:'DELETE',headers:{'Authorization':`Bearer ${S.calToken}`}});}

              ${urgentCnt?`<span class="stat-pill stat-urgent">⚠ ${urgentCnt}</span>`:''}
              <span class="stat-pill stat-count">${p.pendingTasks.length} 件</span>
              ${nextDate?`<span class="stat-date">${nextDate}</span>`:''}

            <span class="proj-arrow ${isOpen?'open':''}">▶</span>

          </div>

      });
    }
  }

  // 私人
  if(pt.length){
    const isOpen=S.expandedProjs.has('__priv__');

    const nextPriv=pendingPt.length?pendingPt.map(t=>t.date).sort()[0]:null;
    html+=`<div style="margin-top:14px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.05em;margin-bottom:10px">🏠 私人行程</div>
    <div class="proj-block" style="--c:#FB8C00;--cb:#FFF3E0;--cm:#FFE0B2">

        <div class="proj-color-dot"></div>
        <span class="proj-code-badge">私人</span>
        <span class="proj-name-text">個人行程</span>
        <div class="proj-stats">
          ${urgentPt?`<span class="stat-pill stat-urgent">⚠ ${urgentPt}</span>`:''}
          <span class="stat-pill stat-count">${pendingPt.length} 件</span>
          ${nextPriv?`<span class="stat-date">${nextPriv}</span>`:''}
        </div>
        <span class="proj-arrow ${isOpen?'open':''}">▶</span>
      </div>
      <div class="proj-tasks ${isOpen?'open':''}">
        ${pt.sort((a,b)=>a.done===b.done?a.date>b.date?1:-1:a.done?1:-1).map(t=>taskCardHTML(t,today,'#FB8C00')).join('')}
      </div>
    </div>`;
  }

  html+='</div>';
  el.innerHTML=html;
}

function toggleProj(code){
  if(S.expandedProjs.has(code))S.expandedProjs.delete(code);
  else S.expandedProjs.add(code);
  renderView();
}

function taskCardHTML(t,today,color){
  const overdue=t.date<today&&!t.done;
  const pc={high:'ph',medium:'pm',low:'pl'}[t.priority]||'pm';
  const pl={high:'緊急',medium:'一般',low:'低'}[t.priority]||'一般';
  const isExpanded=S.expandedCards.has(t.id);
  const isEditing=S.editingCard===t.id;
  const codeOpts=S.projects.map(p=>`<option value="${p.code}" ${p.code===t.code?'selected':''}>${p.code} — ${p.name}</option>`).join('');
  return`<div class="task-card ${t.type==='private'?'priv':''} ${t.done?'done-card':''} ${overdue?'overdue-card':''}" id="card-${t.id}" style="--c:${color}">
    <div class="chk ${t.done?'on '+(t.type==='private'?'gn':''):''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</div>
    <div class="task-body" onclick="toggleCard(${t.id})">
      <div class="task-title">${overdue?'<span style="color:var(--red);font-size:10px">逾期 </span>':''}${t.title}</div>
      <div class="task-meta">
        <span class="task-date">${t.date}${t.time?' '+t.time:''}${t.timeEnd?' — '+t.timeEnd:''}</span>
        <span class="prio ${pc}">${pl}</span>
        ${t.code?`<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3)">${t.code}</span>`:''}
        ${t.calEventId?`<span class="synced">✓ 已同步</span>`:''}
      </div>
    </div>
    <div class="task-acts">
      <button class="t-btn" onclick="startEdit(${t.id})" title="編輯">✏️</button>
      <button class="t-btn del" onclick="delTask(${t.id})" title="刪除">✕</button>
    </div>
  </div>
  <div class="task-detail ${isExpanded||isEditing?'open':''}" id="detail-${t.id}">
    ${isEditing?`
    <div class="edit-form open">
      <div class="edit-row">
        <div class="edit-field" style="grid-column:1/-1"><label>任務名稱</label><input type="text" id="e-title-${t.id}" value="${t.title}"></div>
      </div>
      <div class="edit-row">
        ${t.type==='work'?`<div class="edit-field"><label>計畫代碼</label><select id="e-code-${t.id}">${codeOpts}</select></div>`:'<div></div>'}
        <div class="edit-field"><label>優先級</label><select id="e-prio-${t.id}">
          <option value="high" ${t.priority==='high'?'selected':''}>🔴 緊急</option>
          <option value="medium" ${t.priority==='medium'?'selected':''}>🟡 一般</option>
          <option value="low" ${t.priority==='low'?'selected':''}>🟢 低</option>
        </select></div>
      </div>
      <div class="edit-row">
        <div class="edit-field"><label>日期</label><input type="date" id="e-date-${t.id}" value="${t.date}"></div>
        <div class="edit-field"><label>地點（私人選填）</label><input type="text" id="e-loc-${t.id}" value="${t.loc||''}"></div>
      </div>
      <div class="edit-row">
        <div class="edit-field"><label>開始時間</label><input type="time" id="e-start-${t.id}" value="${t.time||''}"></div>
        <div class="edit-field"><label>結束時間</label><input type="time" id="e-end-${t.id}" value="${t.timeEnd||''}"></div>
      </div>
      <div class="detail-section"><div class="detail-label">備註</div>
        <textarea class="detail-note" id="e-note-${t.id}">${t.note||''}</textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-soft" onclick="cancelEdit()" style="font-size:12px;padding:6px 12px">取消</button>
        <button class="btn btn-blue" onclick="saveEdit(${t.id})" style="font-size:12px;padding:6px 12px">儲存</button>
      </div>
    </div>`:
    isExpanded?`
    ${t.rawInfo?`<div class="detail-section"><div class="detail-label">原始資訊</div><div class="detail-content" style="white-space:pre-wrap;font-size:11px;font-family:'JetBrains Mono',monospace">${t.rawInfo}</div></div>`:''}
    ${t.note?`<div class="detail-section"><div class="detail-label">說明</div><div class="detail-content">${t.note}</div></div>`:''}
    <div class="detail-section"><div class="detail-label">備註</div>
      <textarea class="detail-note" id="note-${t.id}" placeholder="新增備註…" onblur="saveNote(${t.id}, this.value)">${t.note||''}</textarea>
    </div>
    ${t.calEventId?`<div style="font-size:11px;color:var(--green);margin-top:4px">✓ 已同步至 Google Calendar</div>`:''}
    `:''}
  </div>`;
}

function toggleCard(id){
  if(S.editingCard===id)return;
  if(S.expandedCards.has(id))S.expandedCards.delete(id);
  else S.expandedCards.add(id);
  renderView();
}

function startEdit(id){S.editingCard=id;S.expandedCards.add(id);renderView();}
function cancelEdit(){S.editingCard=null;renderView();}

async function saveEdit(id){
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  t.title=document.getElementById(`e-title-${id}`).value.trim()||t.title;
  t.date=document.getElementById(`e-date-${id}`).value||t.date;
  t.time=document.getElementById(`e-start-${id}`).value||null;
  t.timeEnd=document.getElementById(`e-end-${id}`).value||null;
  t.priority=document.getElementById(`e-prio-${id}`).value;
  t.note=document.getElementById(`e-note-${id}`).value;
  t.loc=document.getElementById(`e-loc-${id}`)?.value||'';
  if(t.type==='work')t.code=document.getElementById(`e-code-${id}`).value;
  S.editingCard=null;save();renderView();buildSuggestion();
  toast('✅ 已儲存','ok');
}

function saveNote(id,val){const t=S.tasks.find(t=>t.id===id);if(t){t.note=val;save();}}

function toggleDone(id){const t=S.tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();renderView();buildSuggestion();}}

async function delTask(id){
  if(!confirm('確定要刪除這個任務嗎？'))return;
  const t=S.tasks.find(t=>t.id===id);
  if(t&&t.calEventId){await deleteCal(t.calEventId);toast('✅ 任務與行事曆事件已一併刪除','ok');}
  S.tasks=S.tasks.filter(t=>t.id!==id);
  S.expandedCards.delete(id);
  save();renderView();buildSuggestion();
}

// WEEK VIEW
function renderWeek(){
  const today=new Date();
  const monday=new Date(today);
  monday.setDate(today.getDate()-((today.getDay()+6)%7)+S.weekOffset*7);
  const days=[];
  for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d);}
  const todayStr=new Date().toISOString().split('T')[0];
  const endD=new Date(monday);endD.setDate(monday.getDate()+4);
  document.getElementById('nav-label').textContent=`${monday.getMonth()+1}/${monday.getDate()} — ${endD.getMonth()+1}/${endD.getDate()}`;
  const el=document.getElementById('main-view');
  el.innerHTML=`<div style="padding:16px 20px"><div class="week-wrap"><div class="week-grid">
    <div class="time-col">${['09','10','11','12','13','14','15','16','17'].map(h=>`<div class="time-slot">${h}:00</div>`).join('')}</div>
    ${days.map(d=>{
      const ds=fmtDate(d);
      const dayTasks=S.tasks.filter(t=>t.date===ds).sort((a,b)=>a.done===b.done?0:a.done?1:-1);
      const isToday=ds===todayStr;
      return`<div class="week-day-col${isToday?' today-col':''}">
        <div class="week-day-hdr">${['一','二','三','四','五'][d.getDay()-1]||''} ${d.getMonth()+1}/${d.getDate()}</div>
        <div class="week-events">
          ${dayTasks.map(t=>{
            const ci=t.type==='private'?-1:getColor(t.code||'0000X');
            const c=t.type==='private'?'#FB8C00':COLORS[ci]||'#888';
            const cb=t.type==='private'?'#FFF3E0':COLOR_BG[ci]||'#f5f5f5';
            return`<div class="week-ev ${t.done?'done-ev':''}" style="background:${cb};--c:${c}" onclick="openCalLink(${JSON.stringify(t).replace(/"/g,'&quot;')})">
              <div class="week-ev-time">${t.time||'全天'}${t.timeEnd?' — '+t.timeEnd:''}</div>
              <div class="week-ev-title">${t.title}</div>
              ${t.code?`<div class="week-ev-code">${t.code}</div>`:''}
              ${t.calEventId?`<div class="week-ev-synced">✓ 已同步</div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div></div></div>`;
}

// CALENDAR VIEW
function renderCal(){
  const mn=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('nav-label').textContent=`${S.calYear} / ${mn[S.calMonth]}`;
  const today=new Date().toISOString().split('T')[0];
  const first=new Date(S.calYear,S.calMonth,1);
  const last=new Date(S.calYear,S.calMonth+1,0);
  let startDay=first.getDay()-1;if(startDay<0)startDay=6;
  let cells=[];
  for(let i=0;i<startDay;i++){const d=new Date(S.calYear,S.calMonth,1-startDay+i);cells.push({date:fmtDate(d),other:true});}
  for(let d=1;d<=last.getDate();d++)cells.push({date:`${S.calYear}-${String(S.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,other:false});
  while(cells.length%7!==0)cells.push({date:'',other:true});
  const el=document.getElementById('main-view');
  el.innerHTML=`<div style="padding:16px 20px">
  <div class="cal-week-hdr">${['一','二','三','四','五','六','日'].map(d=>`<div class="cal-wday">${d}</div>`).join('')}</div>
  <div class="cal-grid">${cells.map(c=>{
    if(!c.date)return`<div class="cal-cell other-month"></div>`;
    const dayTasks=S.tasks.filter(t=>t.date===c.date);
    const isToday=c.date===today;
    return`<div class="cal-cell${c.other?' other-month':''}${isToday?' today':''}">
      <div class="cal-num">${parseInt(c.date.split('-')[2])}</div>
      ${dayTasks.slice(0,3).map(t=>{
        const ci=t.type==='private'?-1:getColor(t.code||'0000X');
        const c2=t.type==='private'?'#FB8C00':COLORS[ci]||'#888';
        const cm2=t.type==='private'?'#FFE0B2':COLOR_MID[ci]||'#ddd';
        return`<div class="cal-ev-dot ${t.done?'done-dot':''}" style="background:${cm2};color:${c2}">${t.title}</div>`;
      }).join('')}
      ${dayTasks.length>3?`<div style="font-size:9px;color:var(--text3)">+${dayTasks.length-3}</div>`:''}
    </div>`;
  }).join('')}</div></div>`;
}

function openCalLink(task){
  if(task.calEventId){window.open(`https://calendar.google.com/calendar/r/eventedit/${task.calEventId}`,'_blank');return;}
  const title=encodeURIComponent(task.type==='work'?`[${task.code}] ${task.title}`:task.title);
  const date=task.date.replace(/-/g,'');
  const st=task.time?date+'T'+task.time.replace(':','')+'00':date;
  const et=task.timeEnd?date+'T'+task.timeEnd.replace(':','')+'00':task.time?date+'T'+addH(task.time).replace(':','')+'00':date;
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${st}/${et}`,'_blank');
}

// SUGGESTION
function buildSuggestion(){
  const el=document.getElementById('sug-txt');
  const tags=document.getElementById('sug-tags');
  const today=new Date().toISOString().split('T')[0];
  const pending=S.tasks.filter(t=>!t.done).sort((a,b)=>a.date>b.date?1:-1);
  if(!pending.length){el.textContent='目前沒有待辦任務，好好休息 ☕';tags.innerHTML='';return;}
  const overdue=pending.filter(t=>t.date<today);
  const todayT=pending.filter(t=>t.date===today);
  const thisWeek=pending.filter(t=>{const d=new Date(t.date);const now=new Date();const diff=(d-now)/86400000;return diff>=0&&diff<=7;});
  const urgent=pending.filter(t=>t.priority==='high');
  let parts=[];
  if(overdue.length)parts.push(`<b style="color:var(--red)">逾期 ${overdue.length} 件</b>，請優先處理：${overdue.map(t=>t.title).slice(0,2).join('、')}`);
  if(todayT.length)parts.push(`今天有 <b>${todayT.length} 件</b>任務：${todayT.map(t=>t.title).slice(0,2).join('、')}`);
  else if(urgent.length&&!overdue.length)parts.push(`最近緊急事項：<b>${urgent[0].title}</b>（${urgent[0].date}）`);
  if(!parts.length)parts.push(`下一個截止：<b>${pending[0].title}</b>（${pending[0].date}）`);
  el.innerHTML=parts.join('<br>');
  let tagHtml='';
  if(overdue.length)tagHtml+=`<span class="sug-tag urgent">逾期 ${overdue.length} 件</span>`;
  if(todayT.length)tagHtml+=`<span class="sug-tag soon">今天 ${todayT.length} 件</span>`;
  if(thisWeek.length)tagHtml+=`<span class="sug-tag ok">本週 ${thisWeek.length} 件</span>`;
  tags.innerHTML=tagHtml;
}

// PROJ MANAGER
function openProjModal(){renderProjList();document.getElementById('proj-modal').classList.add('show');}
function renderProjList(){
  document.getElementById('proj-list').innerHTML=S.projects.map((p,i)=>{
    const c=p.code==='0000X'?'#888':COLORS[getColor(p.code)]||'#888';
    return`<div class="proj-item">
      <span class="proj-code-s" style="background:${c}">${p.code}</span>
      <span class="proj-nm">${p.name}</span>
      ${p.code!=='0000X'?`<button class="pdel" onclick="delProj('${p.code}')">✕</button>`:''}
    </div>`;
  }).join('');
}
function addProj(){
  const code=document.getElementById('new-code').value.trim().toUpperCase();
  const name=document.getElementById('new-name').value.trim();
  if(!code||!name){toast('請填寫代碼和名稱','err');return;}
  if(!/^\d{4}[A-Z]$/.test(code)){toast('格式：4數字+1大寫英文，例如 1234A','err');return;}
  if(S.projects.find(p=>p.code===code)){toast('此代碼已存在','err');return;}
  S.projects.push({code,name});getColor(code);save();renderProjList();fillCodeSel();
  document.getElementById('new-code').value='';document.getElementById('new-name').value='';
  toast('✅ 案子已新增','ok');
}
function delProj(code){S.projects=S.projects.filter(p=>p.code!==code);save();renderProjList();fillCodeSel();}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className=`toast ${type}`,3000);}

const td=new Date().toISOString().split('T')[0];
if(document.getElementById('w-date'))document.getElementById('w-date').value=td;
if(document.getElementById('p-date'))document.getElementById('p-date').value=td;
</script>

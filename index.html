<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To Do List</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-border:#BFDBFE;
  --green:#059669;--green-bg:#ECFDF5;--green-border:#A7F3D0;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-400:#9CA3AF;--gray-600:#4B5563;--gray-900:#111827;
  --red:#DC2626;--red-bg:#FEF2F2;
  --amber:#D97706;--amber-bg:#FFFBEB;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --r:12px;--r-sm:8px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* LOGIN */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#EFF6FF,#F0FDF4);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:48px 40px;box-shadow:var(--shadow-md);max-width:400px;width:100%;text-align:center}
.login-icon{font-size:40px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:700;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--gray-600);line-height:1.7;margin-bottom:32px}
#login-err{color:var(--red);font-size:13px;margin-top:16px;display:none;padding:10px;background:var(--red-bg);border-radius:8px}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-title{font-size:15px;font-weight:700}
.hdr-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:500}
.hdr-right{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.hdr-email{font-size:12px;color:var(--gray-400);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{background:none;border:1px solid var(--gray-200);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--gray-600);display:flex;align-items:center;gap:4px;transition:all .15s}
.icon-btn:hover{background:var(--gray-100)}

/* SUGGESTION */
.sug{background:#fff;border-bottom:1px solid var(--gray-200);padding:10px 20px;display:flex;align-items:flex-start;gap:10px}
.sug-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.sug-text{font-size:13px;color:var(--gray-600);line-height:1.6;flex:1}
.sug-text strong{color:var(--gray-900)}
.sug-loading{color:var(--gray-400);font-style:italic}
.sug-refresh{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:6px;font-family:inherit;flex-shrink:0;margin-top:2px}
.sug-refresh:hover{background:var(--blue-bg)}

/* CLAUDE HINT */
.claude-hint{background:var(--blue-bg);border-bottom:1px solid var(--blue-border);padding:10px 20px;display:flex;align-items:center;gap:10px}
.claude-hint-text{font-size:12px;color:var(--blue);line-height:1.5;flex:1}
.hint-copy{font-size:11px;color:var(--blue);background:#fff;border:1px solid var(--blue-border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.hint-copy:hover{background:var(--blue-bg)}

/* INPUT TOGGLE */
.toggle-bar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 20px}
.toggle-btn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:10px 0;width:100%}
.toggle-arrow{font-size:10px;transition:transform .25s;margin-left:auto}
.toggle-arrow.open{transform:rotate(180deg)}

/* INPUT PANEL */
.input-panel{background:#fff;border-bottom:1px solid var(--gray-200);overflow:hidden;max-height:0;transition:max-height .3s ease}
.input-panel.open{max-height:500px}
.input-inner{padding:16px 20px}

.seg-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.seg{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--gray-200);background:none;cursor:pointer;font-family:inherit;color:var(--gray-600);transition:all .15s}
.seg.on-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.seg.on-green{background:var(--green);color:#fff;border-color:var(--green)}

/* PASTE IMPORT */
.paste-area{background:var(--gray-50);border-radius:var(--r-sm);padding:14px;border:1px solid var(--gray-200)}
.paste-label{font-size:12px;font-weight:500;color:var(--gray-600);margin-bottom:8px}
textarea{width:100%;height:100px;border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:10px;font-size:12px;font-family:'JetBrains Mono',monospace;resize:none;outline:none;background:#fff;color:var(--gray-900);transition:border .15s}
textarea:focus{border-color:var(--blue)}
textarea::placeholder{font-family:'Noto Sans TC',sans-serif;color:var(--gray-400)}
.paste-actions{display:flex;gap:8px;margin-top:8px}

/* MANUAL FORM */
.manual-form{display:grid;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.fld label{display:block;font-size:11px;font-weight:500;color:var(--gray-600);margin-bottom:4px}
.fld input,.fld select{width:100%;border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--gray-900);outline:none;background:#fff;transition:border .15s}
.fld input:focus,.fld select:focus{border-color:var(--blue)}

/* BUTTONS */
.btn{border:none;border-radius:var(--r-sm);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#1D4ED8}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#047857}
.btn-gray{background:var(--gray-100);color:var(--gray-600)}
.btn-gray:hover{background:var(--gray-200)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* MAIN LAYOUT */
.main-layout{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 54px)}
@media(max-width:700px){.main-layout{grid-template-columns:1fr}}

/* TODO */
.todo-col{padding:16px 20px;border-right:1px solid var(--gray-200)}
@media(max-width:700px){.todo-col{border-right:none;border-bottom:1px solid var(--gray-200)}}
.col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.col-title{font-size:14px;font-weight:700}
.tab-group{display:flex;gap:4px}
.tab{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--gray-200);background:none;cursor:pointer;font-family:inherit;color:var(--gray-600);font-weight:500;transition:all .15s}
.tab.tw{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab.tp{background:var(--green);color:#fff;border-color:var(--green)}

/* PROJECT GROUP */
.proj-grp{margin-bottom:16px}
.proj-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.code-tag{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--blue-bg);color:var(--blue);padding:2px 7px;border-radius:4px;font-weight:500}
.code-tag.warn{background:var(--amber-bg);color:var(--amber)}
.proj-name{font-size:12px;color:var(--gray-400)}

/* TASK CARD */
.task-card{background:#fff;border-radius:var(--r);border:1px solid var(--gray-200);padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--shadow);transition:box-shadow .15s,transform .15s;border-left:3px solid var(--blue)}
.task-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card.priv{border-left-color:var(--green)}
.task-card.done{opacity:.45}
.task-card.done .task-title{text-decoration:line-through;color:var(--gray-400)}
.chk{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--gray-200);cursor:pointer;flex-shrink:0;margin-top:2px;background:none;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:transparent;transition:all .15s}
.chk:hover{border-color:var(--blue)}
.chk.on{background:var(--blue);border-color:var(--blue);color:#fff}
.chk.gn{background:var(--green);border-color:var(--green);color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:5px}
.task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.task-date{font-size:11px;color:var(--gray-400);font-family:'JetBrains Mono',monospace}
.prio{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.ph{background:var(--red-bg);color:var(--red)}
.pm{background:var(--amber-bg);color:var(--amber)}
.pl{background:var(--green-bg);color:var(--green)}
.task-code{font-size:10px;color:var(--gray-400);font-family:'JetBrains Mono',monospace}
.task-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-card:hover .task-actions{opacity:1}
.task-action-btn{font-size:11px;border:none;background:none;cursor:pointer;padding:4px;color:var(--gray-400);border-radius:4px;font-family:inherit}
.task-action-btn:hover{color:var(--blue);background:var(--blue-bg)}
.task-action-btn.del:hover{color:var(--red);background:var(--red-bg)}
.empty{text-align:center;padding:48px 20px;color:var(--gray-400);font-size:13px}
.empty-ico{font-size:32px;margin-bottom:8px}

/* CALENDAR PANEL */
.cal-col{padding:16px 20px;background:#fff}
@media(max-width:700px){.cal-col{background:var(--gray-50)}}
.cal-legend{display:flex;gap:10px}
.ldot{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-600)}
.ldot-dot{width:7px;height:7px;border-radius:50%}
.cal-today{font-size:11px;color:var(--gray-400);font-family:'JetBrains Mono',monospace;margin:6px 0 14px}
.date-div{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.04em;margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.date-div::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.cal-ev{border-radius:var(--r-sm);padding:9px 11px;margin-bottom:7px;border-left:2px solid var(--blue);background:var(--blue-bg);cursor:pointer;transition:opacity .15s}
.cal-ev:hover{opacity:.85}
.cal-ev.priv{border-left-color:var(--green);background:var(--green-bg)}
.cal-ev-time{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--blue);margin-bottom:2px;font-weight:500}
.cal-ev.priv .cal-ev-time{color:var(--green)}
.cal-ev-title{font-size:12px;font-weight:500}
.cal-ev-code{font-size:10px;color:var(--gray-400);font-family:'JetBrains Mono',monospace;margin-top:2px}
.cal-ev-hint{font-size:10px;color:var(--blue);margin-top:3px}
.cal-ev.priv .cal-ev-hint{color:var(--green)}
.cal-empty{text-align:center;padding:24px 0;color:var(--gray-400);font-size:13px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* PARSED ITEMS */
.parsed-item{background:var(--gray-50);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;border:1px solid var(--gray-200)}
.pi-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:600}
.pi-type-work{color:var(--blue)}
.pi-type-priv{color:var(--green)}
.pi-note{font-size:11px;color:var(--gray-400);font-weight:400}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fi label{font-size:11px;font-weight:500;color:var(--gray-600)}
.fi input,.fi select{border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:7px 9px;font-size:12px;font-family:inherit;background:#fff;color:var(--gray-900);outline:none;width:100%}
.fi input:focus,.fi select:focus{border-color:var(--blue)}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.warn-border{border-color:var(--amber)!important}

/* PROJ MODAL */
.proj-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px}
.proj-code{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--blue-bg);color:var(--blue);padding:2px 7px;border-radius:4px}
.proj-nm{flex:1;color:var(--gray-700)}
.pdel{color:var(--gray-400);background:none;border:none;cursor:pointer;padding:4px 8px;font-size:13px;border-radius:4px}
.pdel:hover{color:var(--red);background:var(--red-bg)}
.padd-row{display:flex;gap:8px;margin-top:12px}
.padd-row input{flex:1;border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--gray-900);outline:none;background:#fff}
.padd-row input:focus{border-color:var(--blue)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:20px;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transform:translateY(60px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#065F46;color:#fff}
.toast.err{background:#991B1B;color:#fff}
.toast.info{background:var(--gray-900);color:#fff}

/* SPINNER */
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}

/* SYNC STATUS */
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">📌</div>
    <div class="login-title">My To Do List</div>
    <div class="login-sub">整理公事與私人行程，同步 Google Calendar。<br>請使用指定 Google 帳號登入。</div>
    <div id="g-btn-wrap" style="display:flex;justify-content:center"></div>
    <div id="login-err">❌ 此帳號無使用權限</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <span class="hdr-title">📌 My To Do List</span>
      <span class="hdr-badge"><span class="sync-dot" id="sync-dot"></span>已連線</span>
    </div>
    <div class="hdr-right">
      <div class="avatar" id="u-avatar">U</div>
      <span class="hdr-email" id="u-email"></span>
      <button class="icon-btn" onclick="openProjModal()">⚙ 管理案子</button>
    </div>
  </div>

  <!-- AI SUGGESTION -->
  <div class="sug">
    <span class="sug-icon">🤖</span>
    <div class="sug-text" id="sug-text"><span class="sug-loading">分析今日建議中…</span></div>
    <button class="sug-refresh" onclick="buildSuggestion()">↻ 重新分析</button>
  </div>

  <!-- CLAUDE HINT BAR -->
  <div class="claude-hint">
    <span style="font-size:15px">💡</span>
    <div class="claude-hint-text">
      用 Claude 整理信件或 Line 訊息後，把結果貼到下方「AI 格式匯入」，一鍵加入待辦清單。
      <button class="hint-copy" onclick="copyPrompt()">複製 Claude 提示詞</button>
    </div>
  </div>

  <!-- INPUT TOGGLE -->
  <div class="toggle-bar">
    <button class="toggle-btn" onclick="toggleInput()">
      ＋ 新增任務 / 匯入整理結果
      <span class="toggle-arrow" id="toggle-arrow">▼</span>
    </button>
  </div>

  <!-- INPUT PANEL -->
  <div class="input-panel" id="input-panel">
    <div class="input-inner">
      <div class="seg-tabs">
        <button class="seg on-blue" id="it-paste" onclick="setITab('paste')">📋 貼上 Claude 整理結果</button>
        <button class="seg" id="it-work" onclick="setITab('work')">🏢 手動新增公事</button>
        <button class="seg" id="it-priv" onclick="setITab('priv')">🏠 手動新增私人行程</button>
      </div>

      <!-- PASTE IMPORT -->
      <div id="area-paste">
        <div class="paste-area">
          <div class="paste-label">將 Claude 整理好的任務清單貼在這裡：</div>
          <textarea id="paste-box" placeholder="任務名稱：審核 Q3 財報
計畫代碼：1234A
截止日期：2026-06-13
優先級：高
---
任務名稱：家庭聚餐
類型：私人
日期：2026-06-15
時間：18:00"></textarea>
          <div class="paste-actions">
            <button class="btn btn-blue" onclick="parsePaste()">⚡ 解析並匯入</button>
            <button class="btn btn-gray" onclick="document.getElementById('paste-box').value=''">清除</button>
          </div>
        </div>
      </div>

      <!-- MANUAL WORK -->
      <div id="area-work" style="display:none">
        <div class="manual-form">
          <div class="form-row">
            <div class="fld"><label>任務名稱</label><input type="text" id="w-title" placeholder="例：審核合約文件"></div>
            <div class="fld"><label>計畫代碼</label><select id="w-code"></select></div>
          </div>
          <div class="form-row">
            <div class="fld"><label>截止日期</label><input type="date" id="w-date"></div>
            <div class="fld"><label>優先級</label>
              <select id="w-prio">
                <option value="high">🔴 緊急</option>
                <option value="medium" selected>🟡 一般</option>
                <option value="low">🟢 低</option>
              </select>
            </div>
          </div>
          <button class="btn btn-blue" onclick="addWork()" style="width:fit-content">＋ 新增公事任務</button>
        </div>
      </div>

      <!-- MANUAL PRIVATE -->
      <div id="area-priv" style="display:none">
        <div class="manual-form">
          <div class="fld"><label>行程名稱</label><input type="text" id="p-title" placeholder="例：看診、家庭聚餐、健身"></div>
          <div class="form-row">
            <div class="fld"><label>日期</label><input type="date" id="p-date"></div>
            <div class="fld"><label>開始時間</label><input type="time" id="p-start" value="18:00"></div>
          </div>
          <div class="form-row">
            <div class="fld"><label>結束時間</label><input type="time" id="p-end" value="20:00"></div>
            <div class="fld"><label>地點（選填）</label><input type="text" id="p-loc" placeholder="例：台大醫院"></div>
          </div>
          <button class="btn btn-green" onclick="addPriv()" style="width:fit-content">＋ 新增私人行程</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-layout">

    <!-- TODO LIST -->
    <div class="todo-col">
      <div class="col-hdr">
        <span class="col-title">待辦清單</span>
        <div class="tab-group">
          <button class="tab tw" id="tab-w" onclick="setTab('work')">🏢 公事</button>
          <button class="tab" id="tab-p" onclick="setTab('priv')">🏠 私人</button>
        </div>
      </div>
      <div id="todo-list"></div>
    </div>

    <!-- CALENDAR -->
    <div class="cal-col">
      <div class="col-hdr">
        <span class="col-title">📅 即將行程</span>
        <div class="cal-legend">
          <span class="ldot"><span class="ldot-dot" style="background:var(--blue)"></span>公事</span>
          <span class="ldot"><span class="ldot-dot" style="background:var(--green)"></span>私人</span>
        </div>
      </div>
      <div class="cal-today" id="cal-today"></div>
      <div id="cal-list"></div>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->

const CLAUDE_PROMPT = `請幫我整理以下信件或訊息中的待辦事項，輸出格式如下，每個任務用 --- 分隔：

任務名稱：（20字內，具體清晰）

// ══════════════════════════════════════════
//  貼上解析（規則比對，免 API）
// ══════════════════════════════════════════
function parsePaste() {
  const text = document.getElementById('paste-box').value.trim();
  if(!text) { toast('請先貼上內容', 'err'); return; }

  const blocks = text.split(/\n?---\n?/).filter(b => b.trim());
  const tasks = [];

  blocks.forEach(block => {
    const get = (keys) => {
      for(const key of keys) {
        const m = block.match(new RegExp(`${key}[：:]\s*(.+)`, 'i'));
        if(m) return m[1].trim();
      }
      return '';
    };

    const title    = get(['任務名稱','行程名稱','名稱','title']);
    const typeRaw  = get(['類型','type']);
    const codeRaw  = get(['計畫代碼','代碼','code']);
    const dateRaw  = get(['截止日期','日期','date']);
    const timeRaw  = get(['時間','time']);
    const prioRaw  = get(['優先級','優先','priority']);
    const note     = get(['說明','備註','note']);

    if(!title) return;

    const type = (typeRaw.includes('私人') || typeRaw.toLowerCase()==='private') ? 'private' : 'work';

    const codeMatch = (codeRaw || block).match(/\d{4}[A-Z]/);
    const code = type==='work' ? (codeMatch ? codeMatch[0] : '0000X') : null;

    const dateMatch = (dateRaw || '').match(/\d{4}-\d{2}-\d{2}/);
    const date = dateMatch ? dateMatch[0] : new Date().toISOString().split('T')[0];

    const timeMatch = (timeRaw || '').match(/\d{1,2}:\d{2}/);
    const time = timeMatch ? timeMatch[0] : null;

    const prioMap = {'高':'high','中':'medium','低':'low','緊急':'high'};
    const priority = prioMap[prioRaw] || 'medium';

    tasks.push({title, type, code, date, time, priority, note});
  });

  if(!tasks.length) {
    toast('找不到任務格式，請確認內容', 'err');
    return;
  }

  S.pending = tasks;
  showConfirmModal();
}

function showConfirmModal() {
  const opts = S.projects.map(p =>
    `<option value="${p.code}">${p.code} — ${p.name}</option>`
  ).join('');

  document.getElementById('parsed-list').innerHTML = S.pending.map((t,i) => `
  <div class="parsed-item">
    <div class="pi-head">
      <span class="${t.type==='private'?'pi-type-priv':'pi-type-work'}">
        ${t.type==='private'?'🏠 私人行程':'🏢 公事任務'}
      </span>
      <span class="pi-note">${t.note||''}</span>
    </div>
    <div class="fi">
      <label>任務名稱</label>
      <input type="text" value="${t.title}" id="pt${i}-title">
    </div>
    ${t.type==='work' ? `
    <div class="fi">
      <label>計畫代碼 ${t.code==='0000X'?'<span style="color:var(--amber);font-size:10px">⚠ 請確認</span>':''}</label>
      <select id="pt${i}-code" class="${t.code==='0000X'?'warn-border':''}"
        onchange="this.className=this.value==='0000X'?'warn-border':''">
        ${opts.replace(`value="${t.code}"`, `value="${t.code}" selected`)}
      </select>
    </div>` : ''}
    <div class="fi-row">
      <div class="fi"><label>日期</label><input type="date" value="${t.date}" id="pt${i}-date"></div>
      <div class="fi"><label>時間（選填）</label><input type="time" value="${t.time||''}" id="pt${i}-time"></div>
    </div>
    <div class="fi" style="margin-top:8px">
      <label>優先級</label>
      <select id="pt${i}-prio">
        <option value="high" ${t.priority==='high'?'selected':''}>🔴 緊急</option>
        <option value="medium" ${t.priority==='medium'?'selected':''}>🟡 一般</option>
        <option value="low" ${t.priority==='low'?'selected':''}>🟢 低</option>
      </select>
    </div>
  </div>`).join('');

  document.getElementById('confirm-modal').classList.add('show');
}

function commitTasks() {
  const newTasks = [];
  for(let i=0; i<S.pending.length; i++) {
    const t = S.pending[i];
    const title    = document.getElementById(`pt${i}-title`).value.trim();
    const date     = document.getElementById(`pt${i}-date`).value;
    const time     = document.getElementById(`pt${i}-time`)?.value || null;
    const code     = t.type==='work' ? (document.getElementById(`pt${i}-code`)?.value || '0000X') : null;
    const priority = document.getElementById(`pt${i}-prio`).value;

    if(!title || !date) { toast('請填寫所有必填欄位', 'err'); return; }

    newTasks.push({
      id: Date.now()+i,
      type: t.type, title, date, time, code, priority, done: false,
    });
  }

  S.tasks.push(...newTasks);
  save();
  closeModal('confirm-modal');
  document.getElementById('paste-box').value = '';
  render(); renderCal(); buildSuggestion();
  toast(`✅ 已新增 ${newTasks.length} 個任務`, 'ok');
}

// ══════════════════════════════════════════

  const title = document.getElementById('p-title').value.trim();

// ══════════════════════════════════════════
//  Google Calendar 跳轉
// ══════════════════════════════════════════
function openCalendar(task) {
  const title  = encodeURIComponent(task.type==='work' ? `[${task.code}] ${task.title}` : task.title);
  const date   = task.date.replace(/-/g,'');
  const start  = task.time ? date+'T'+task.time.replace(':','')+'00' : date;
  const end    = task.timeEnd ? date+'T'+task.timeEnd.replace(':','')+'00'
               : task.time   ? date+'T'+addHour(task.time).replace(':','')+'00'
               : date;
  const loc    = task.loc ? encodeURIComponent(task.loc) : '';
  const detail = encodeURIComponent(task.type==='work' ? `計畫代碼：${task.code}` : '私人行程');
  const color  = task.type==='work' ? '9' : '10';
  const url    = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${detail}&location=${loc}&color=${color}`;
  window.open(url, '_blank');
}

function addHour(t) {
  const[h,m] = t.split(':').map(Number);
  return `${String((h+1)%24).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ══════════════════════════════════════════
//  AI 今日建議（本地規則，不需 API）
// ══════════════════════════════════════════
function buildSuggestion() {
  const el = document.getElementById('sug-text');
  const today = new Date().toISOString().split('T')[0];
  const pending = S.tasks.filter(t => !t.done).sort((a,b) => a.date > b.date ? 1 : -1);

  if(!pending.length) {
    el.textContent = '目前沒有待辦任務，好好休息 ☕';
    return;
  }

  const overdue  = pending.filter(t => t.date < today);
  const todayT   = pending.filter(t => t.date === today);
  const urgent   = pending.filter(t => t.priority==='high' && t.date > today);
  const upcoming = pending.filter(t => t.date > today && t.priority!=='high').slice(0,2);

  let parts = [];
  if(overdue.length)  parts.push(`<b style="color:var(--red)">逾期 ${overdue.length} 件</b>請優先處理：${overdue[0].title}`);
  if(todayT.length)   parts.push(`今天有 <b>${todayT.length} 件</b>任務，建議先完成：${todayT[0].title}`);
  if(urgent.length)   parts.push(`緊急事項：<b>${urgent[0].title}</b>（${urgent[0].date}）`);
  if(upcoming.length && parts.length < 2) parts.push(`近期待辦：${upcoming.map(t=>t.title).join('、')}`);

  el.innerHTML = parts.length
    ? '<b>今日建議：</b>' + parts.join('；')
    : `待辦共 ${pending.length} 件，下一個截止：<b>${pending[0].title}</b>（${pending[0].date}）`;
}

// ══════════════════════════════════════════
//  渲染待辦清單
// ══════════════════════════════════════════
function setTab(t) {
  S.tab = t;
  document.getElementById('tab-w').className = 'tab' + (t==='work' ? ' tw' : '');
  document.getElementById('tab-p').className = 'tab' + (t==='priv' ? ' tp' : '');
  renderTodo();
}

function render() { fillCodeSelect(); renderTodo(); }

function cardHTML(t) {
  const pc = {high:'ph', medium:'pm', low:'pl'}[t.priority] || 'pm';
  const pl = {high:'緊急', medium:'一般', low:'低'}[t.priority] || '一般';
  const today = new Date().toISOString().split('T')[0];
  const overdue = t.date < today && !t.done;
  return `
  <div class="task-card ${t.type==='private'?'priv':''} ${t.done?'done':''}" style="${overdue?'border-color:var(--red)':''}">
    <div class="chk ${t.done?'on '+(t.type==='private'?'gn':''):''}" onclick="toggleDone(${t.id})">
      ${t.done?'✓':''}
    </div>
    <div class="task-body">
      <div class="task-title">${overdue?'<span style="color:var(--red);font-size:10px">逾期 </span>':''}${t.title}</div>
      <div class="task-meta">
        <span class="task-date">${t.date}${t.time?' '+t.time:''}</span>
        <span class="prio ${pc}">${pl}</span>
        ${t.code?`<span class="task-code">${t.code}</span>`:''}
      </div>
    </div>
    <div class="task-actions">
      <button class="task-action-btn" onclick="openCalendar(${JSON.stringify(t).replace(/"/g,'&quot;')})" title="加入 Google Calendar">📅</button>
      <button class="task-action-btn del" onclick="delTask(${t.id})" title="刪除">✕</button>
    </div>
  </div>`;
}

function renderTodo() {
  const el = document.getElementById('todo-list');
  if(S.tab === 'work') {
    const wt = S.tasks.filter(t => t.type==='work');
    if(!wt.length) {
      el.innerHTML = `<div class="empty"><div class="empty-ico">📋</div>目前沒有公事任務<br><small style="font-size:12px;margin-top:4px;display:block">點上方「新增任務」開始新增</small></div>`;
      return;
    }
    let html = '';
    S.projects.forEach(p => {
      const pts = wt.filter(t => t.code===p.code);
      if(!pts.length) return;
      html += `<div class="proj-grp">
        <div class="proj-hdr">
          <span class="code-tag ${p.code==='0000X'?'warn':''}">${p.code}</span>
          <span class="proj-name">${p.name}</span>
        </div>
        ${pts.map(cardHTML).join('')}
      </div>`;
    });
    const known = S.projects.map(p=>p.code);
    const unk = wt.filter(t => !known.includes(t.code));
    if(unk.length) html += `<div class="proj-grp"><div class="proj-hdr"><span class="code-tag warn">未知代碼</span></div>${unk.map(cardHTML).join('')}</div>`;
    el.innerHTML = html;
  } else {
    const pt = S.tasks.filter(t => t.type==='private');
    if(!pt.length) {
      el.innerHTML = `<div class="empty"><div class="empty-ico">🏠</div>目前沒有私人行程</div>`;
      return;
    }
    el.innerHTML = pt.map(cardHTML).join('');
  }
}

function toggleDone(id) {
  const t = S.tasks.find(t=>t.id===id);
  if(t) { t.done=!t.done; save(); renderTodo(); buildSuggestion(); }
}

function delTask(id) {
  if(!confirm('確定要刪除這個任務嗎？')) return;
  S.tasks = S.tasks.filter(t=>t.id!==id);
  save(); renderTodo(); renderCal(); buildSuggestion();
}

// ══════════════════════════════════════════
//  渲染行事曆
// ══════════════════════════════════════════
function renderCal() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('cal-today').textContent = `今天 ${today}`;
  const up = S.tasks
    .filter(t => !t.done && t.date >= today)
    .sort((a,b) => (a.date+(a.time||'')) > (b.date+(b.time||'')) ? 1 : -1)
    .slice(0, 25);
  const el = document.getElementById('cal-list');
  if(!up.length) { el.innerHTML = '<div class="cal-empty">沒有即將到來的行程 ✨</div>'; return; }
  let html='', last='';
  up.forEach(t => {
    if(t.date !== last) {
      const d = new Date(t.date+'T00:00:00');
      const lbl = t.date===today ? '今天' : d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric',weekday:'short'});
      html += `<div class="date-div">${lbl}</div>`;
      last = t.date;
    }
    html += `<div class="cal-ev ${t.type==='private'?'priv':''}" onclick="openCalendar(${JSON.stringify(t).replace(/"/g,'&quot;')})">
      <div class="cal-ev-time">${t.time||'全天'}${t.type==='private'?' · 私人':''}</div>
      <div class="cal-ev-title">${t.title}</div>
      ${t.code?`<div class="cal-ev-code">${t.code}</div>`:''}
      <div class="cal-ev-hint">點擊 → 加入 Google Calendar</div>
    </div>`;
  });
  el.innerHTML = html;
}

// ══════════════════════════════════════════
//  案子管理
// ══════════════════════════════════════════
function openProjModal() { renderProjList(); document.getElementById('proj-modal').classList.add('show'); }

function renderProjList() {
  document.getElementById('proj-list').innerHTML = S.projects.map(p => `
  <div class="proj-item">
    <span class="proj-code">${p.code}</span>
    <span class="proj-nm">${p.name}</span>
    ${p.code!=='0000X' ? `<button class="pdel" onclick="delProj('${p.code}')">✕</button>` : ''}
  </div>`).join('');
}

function addProj() {
  const code = document.getElementById('new-code').value.trim().toUpperCase();
  const name = document.getElementById('new-name').value.trim();
  if(!code||!name) { toast('請填寫代碼和名稱', 'err'); return; }
  if(!/^\d{4}[A-Z]$/.test(code)) { toast('格式：4個數字+1個大寫英文，例如 1234A', 'err'); return; }
  if(S.projects.find(p=>p.code===code)) { toast('此代碼已存在', 'err'); return; }
  S.projects.push({code, name});
  save(); renderProjList(); fillCodeSelect();
  document.getElementById('new-code').value = '';
  document.getElementById('new-name').value = '';
  toast('✅ 案子已新增', 'ok');
}

function delProj(code) {
  S.projects = S.projects.filter(p=>p.code!==code);
  save(); renderProjList(); fillCodeSelect();
}

  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.className = `toast ${type}`, 2800);
}

const today = new Date().toISOString().split('T')[0];
if(document.getElementById('w-date')) document.getElementById('w-date').value = today;
if(document.getElementById('p-date')) document.getElementById('p-date').value = today;

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To Do List</title>
<script src="https://accounts.google.com/gsi/client"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFF8E7;
  --white:#FFFFFF;
  --border:#E8E8E8;--border2:#D0D0D0;
  --text:#1A1A1A;--text2:#555;--text3:#999;
  --ora:#F59332; --ora-hover:#E07820; --ora-bg:#FFF3E0; --ora-mid:#FFD699;
  --red:#E53935;--red-bg:#FFF0F0;
  --amber:#F59E0B;--amber-bg:#FFFBEB;
  --green:#16A34A;--green-bg:#F0FDF4;
  --shadow:0 2px 8px rgba(180,100,30,.10);
  --shadow-md:0 4px 20px rgba(180,100,30,.14);
  --r:14px;--r-sm:10px;--r-xs:8px;
  --max-w:860px;
}
.color-0{--c:#E53935;--cb:#FFF0F0;--cm:#FFCDD2}
.color-1{--c:#1E88E5;--cb:#E3F2FD;--cm:#BBDEFB}
.color-2{--c:#43A047;--cb:#E8F5E9;--cm:#C8E6C9}
.color-3{--c:#8E24AA;--cb:#F3E5F5;--cm:#E1BEE7}
.color-4{--c:#F4511E;--cb:#FBE9E7;--cm:#FFCCBC}
.color-5{--c:#00897B;--cb:#E0F2F1;--cm:#B2DFDB}
.color-6{--c:#3949AB;--cb:#E8EAF6;--cm:#C5CAE9}
.color-7{--c:#F9A825;--cb:#FFFDE7;--cm:#FFF9C4}
.color-priv{--c:#FB8C00;--cb:#FFF3E0;--cm:#FFE0B2}

body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.center-wrap{max-width:var(--max-w);margin:0 auto;width:100%}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#FFF8F0,#F0F4FF)}
.login-card{background:var(--white);border-radius:24px;padding:48px 40px;box-shadow:var(--shadow-md);max-width:400px;width:100%;text-align:center;border:1px solid var(--border)}
.login-ico{font-size:48px;margin-bottom:16px}
.login-title{font-size:24px;font-weight:700;margin-bottom:8px;color:var(--ora)}
.login-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:32px}
#login-err{color:var(--red);font-size:13px;margin-top:16px;display:none;padding:10px;background:var(--red-bg);border-radius:10px}

#app{display:none;flex-direction:column;min-height:100vh}

.hdr{background:var(--ora);border-bottom:1px solid var(--ora-hover);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:var(--max-w)}
.hdr-left{display:flex;align-items:center;gap:10px;color:#fff}
.hdr-logo{font-size:20px}
.hdr-title{font-size:15px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.3);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,0.5)}
.hdr-email{font-size:12px;color:rgba(255,255,255,0.9);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-btn{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.pill-btn:hover{background:rgba(255,255,255,0.35)}

.sync-bar{background:var(--ora-bg);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;justify-content:center}
.sync-inner{display:flex;align-items:center;gap:8px;max-width:var(--max-w);width:100%}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt{font-size:11px;color:var(--text2)}

.sug{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:center}
.hint-bar{background:var(--ora-bg);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;justify-content:center}
.hint-inner, .sug-inner{display:flex;align-items:flex-start;gap:12px;max-width:var(--max-w);width:100%}
.hint-inner{align-items:center;gap:10px}
.hint-txt{font-size:12px;color:var(--text2);flex:1;line-height:1.5}
.hint-copy{font-size:11px;color:var(--ora);background:var(--white);border:1px solid var(--ora-mid);border-radius:20px;padding:4px 12px;cursor:pointer;font-family:inherit;font-weight:500}
.hint-copy:hover{background:var(--ora-bg)}

.sug-ico{font-size:20px;flex-shrink:0}
.sug-body{flex:1}
.sug-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.04em}
.sug-txt{font-size:13px;color:var(--text);line-height:1.7}
.sug-txt b{color:var(--red)}
.sug-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.sug-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid var(--border)}
.sug-tag.urgent{background:var(--red-bg);color:var(--red);border-color:#FFCDD2}
.sug-tag.soon{background:var(--amber-bg);color:var(--amber);border-color:#FDE68A}
.sug-tag.ok{background:var(--green-bg);color:var(--green);border-color:#BBF7D0}
.sug-refresh{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:8px;font-family:inherit;margin-top:8px;display:block}

.toggle-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;justify-content:center}
.toggle-btn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ora);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:10px 0;width:100%;max-width:var(--max-w)}
.t-arrow{font-size:10px;transition:transform .25s;margin-left:auto}
.t-arrow.open{transform:rotate(180deg)}
.input-panel{background:var(--white);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .3s ease;display:flex;justify-content:center}
.input-panel.open{max-height:600px}
.input-inner{padding:16px 20px;width:100%;max-width:var(--max-w)}
.seg-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.seg{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--text2);font-weight:500;transition:all .15s}
.seg.on{background:var(--ora);color:#fff;border-color:var(--ora)}
.seg:hover:not(.on){background:var(--ora-bg)}
textarea{width:100%;height:100px;border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px;font-size:12px;font-family:'JetBrains Mono',monospace;resize:none;outline:none;background:var(--bg);color:var(--text);transition:border .15s}
textarea:focus{border-color:var(--ora)}
textarea::placeholder{font-family:'Noto Sans TC',sans-serif;color:var(--text3)}
.ai-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.ai-btns{display:flex;flex-direction:column;gap:6px}
.man-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
.fld label{font-size:11px;font-weight:500;color:var(--text2)}
.fld input,.fld select{border:1px solid var(--border2);border-radius:var(--r-xs);padding:8px 10px;font-size:13px;font-family:inherit;background:var(--white);color:var(--text);outline:none;transition:border .15s}
.fld input:focus,.fld select:focus{border-color:var(--ora)}

.btn{border:none;border-radius:var(--r-xs);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-ora{background:var(--ora);color:#fff}.btn-ora:hover{background:var(--ora-hover)}
.btn-grn{background:#16A34A;color:#fff}.btn-grn:hover{background:#15803D}
.btn-soft{background:var(--white);color:var(--text2);border:1px solid var(--border2)}.btn-soft:hover{background:var(--border)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#C62828}

.view-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;justify-content:center}
.view-bar-inner{display:flex;align-items:center;justify-content:space-between;height:44px;width:100%;max-width:var(--max-w)}
.view-tabs{display:flex;gap:4px}
.vtab{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--text2);font-weight:500;transition:all .15s}
.vtab.on{background:var(--ora);color:#fff;border-color:var(--ora)}
.vtab:hover:not(.on){background:var(--ora-bg)}
.view-nav{display:flex;align-items:center;gap:6px}
.nav-btn{background:var(--bg);border:1px solid var(--border2);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2)}
.nav-btn:hover{background:var(--border)}
.nav-label{font-size:13px;font-weight:500;min-width:80px;text-align:center}

#main-view{padding:16px 20px;max-width:var(--max-w);margin:0 auto;width:100%}

.proj-block{border-radius:var(--r);margin-bottom:10px;border:1.5px solid var(--cm);overflow:hidden;box-shadow:var(--shadow)}
.proj-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--cb);transition:filter .15s;user-select:none}
.proj-header:hover{filter:brightness(.97)}
.proj-color-dot{width:10px;height:10px;border-radius:50%;background:var(--c);flex-shrink:0}
.proj-code-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--c);color:#fff;padding:2px 8px;border-radius:6px;font-weight:500}
.proj-name-text{font-size:13px;font-weight:500;flex:1;color:var(--text)}
.proj-stats{display:flex;gap:6px;align-items:center}
.stat-pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.stat-urgent{background:var(--red-bg);color:var(--red)}
.stat-count{background:var(--white);color:var(--text2);border:1px solid var(--border)}
.stat-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.proj-arrow{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.proj-arrow.open{transform:rotate(90deg)}
.proj-tasks{display:none;padding:6px 10px 10px}
.proj-tasks.open{display:block}

.task-card{background:var(--white);border-radius:var(--r-sm);border:1px solid var(--border);padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start;transition:all .15s;border-left:3px solid var(--c)}
.task-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card.priv{border-left-color:#FB8C00}
.task-card.done-card{opacity:.4}
.task-card.done-card .task-title{text-decoration:line-through;color:var(--text3)}
.task-card.overdue-card{border-left-color:var(--red)}
.chk{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:2px;background:none;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent;transition:all .15s}
.chk:hover{border-color:var(--ora)}
.chk.on{background:var(--ora);border-color:var(--ora);color:#fff}
.chk.gn{background:var(--green);border-color:var(--green);color:#fff}
.task-body{flex:1;min-width:0;cursor:pointer}
.task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px}
.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.task-date{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.prio{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600}
.ph{background:var(--red-bg);color:var(--red)}
.pm{background:var(--amber-bg);color:var(--amber)}
.pl{background:var(--green-bg);color:var(--green)}
.synced{font-size:10px;color:var(--green);font-weight:500}
.task-acts{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-card:hover .task-acts{opacity:1}
.t-btn{font-size:11px;border:1px solid var(--border);background:var(--bg);border-radius:6px;cursor:pointer;padding:3px 7px;color:var(--text2);font-family:inherit;transition:all .15s}
.t-btn:hover{background:var(--ora);border-color:var(--ora);color:#fff}
.t-btn.del:hover{background:var(--red);border-color:var(--red);color:#fff}

.task-detail{display:none;padding:10px 12px;border-top:1px solid var(--border);background:#FAFAFA}
.task-detail.open{display:block}
.detail-section{margin-bottom:10px}
.detail-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;letter-spacing:.04em}
.detail-content{font-size:12px;color:var(--text);line-height:1.6;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.detail-note{width:100%;border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit;color:var(--text);outline:none;resize:none;height:60px;background:var(--white)}
.detail-note:focus{border-color:var(--ora)}
.edit-form{display:none}
.edit-form.open{display:block}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.edit-field{display:flex;flex-direction:column;gap:3px}
.edit-field label{font-size:11px;font-weight:500;color:var(--text2)}
.edit-field input,.edit-field select{border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:var(--text);outline:none;background:var(--white)}
.edit-field input:focus,.edit-field select:focus{border-color:var(--ora)}

.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.empty-ico{font-size:36px;margin-bottom:10px}

.week-wrap{overflow-x:auto}
.week-grid{display:grid;grid-template-columns:44px repeat(5,1fr);gap:4px;min-width:500px}
.time-col{display:flex;flex-direction:column}
.time-slot{height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:6px;font-size:10px;color:var(--text3);padding-top:3px;font-family:'JetBrains Mono',monospace}
.week-day-col{background:var(--white);border-radius:var(--r-sm);border:1px solid var(--border);overflow:hidden;min-height:260px}
.week-day-col.today-col{border-color:var(--ora);border-width:2px}
.week-day-hdr{text-align:center;padding:6px 4px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg)}
.week-day-col.today-col .week-day-hdr{color:var(--ora);background:var(--ora-bg)}
.week-events{padding:4px}
.week-ev{border-radius:6px;padding:4px 6px;margin-bottom:3px;cursor:pointer;transition:opacity .15s;border-left:2px solid var(--c)}
.week-ev:hover{opacity:.8}
.week-ev-time{font-size:9px;color:var(--text3);margin-bottom:1px;font-family:'JetBrains Mono',monospace}
.week-ev-title{font-size:10px;font-weight:500;line-height:1.3;color:var(--text)}
.week-ev-code{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.week-ev-synced{font-size:9px;color:var(--green);margin-top:1px}
.week-ev.done-ev{opacity:.3}

.cal-week-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-wday{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{background:var(--white);border-radius:var(--r-xs);padding:5px;min-height:68px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.cal-cell:hover{background:var(--bg);border-color:var(--ora)}
.cal-cell.today{border-color:var(--ora);border-width:2px}
.cal-cell.other-month{opacity:.35}
.cal-num{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:3px}
.cal-cell.today .cal-num{color:var(--ora);font-weight:700}
.cal-ev-dot{font-size:9px;padding:1px 4px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;background:var(--cm);color:var(--c)}
.cal-ev-dot.done-dot{opacity:.35;filter:grayscale(1)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md);border:2px solid var(--ora-mid)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--ora)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.parsed-item{background:var(--bg);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.pi-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:600}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fi label{font-size:11px;font-weight:500;color:var(--text2)}
.fi input,.fi select{border:1px solid var(--border2);border-radius:var(--r-xs);padding:7px 9px;font-size:12px;font-family:inherit;background:var(--white);color:var(--text);outline:none;width:100%}
.fi input:focus,.fi select:focus{border-color:var(--ora)}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.warn-sel{border-color:var(--red)!important}
.proj-item{display:flex;flex-direction:column;gap:8px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
.proj-item-row{display:flex;align-items:center;gap:8px;width:100%}
.proj-code-s{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 8px;border-radius:6px;color:#fff}
.proj-nm{flex:1;color:var(--text2);font-weight:500}
.pbtn{color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;font-size:12px;border-radius:6px;transition:all .15s}
.pbtn:hover{color:var(--ora);background:var(--ora-bg)}
.pdel:hover{color:var(--red);background:var(--red-bg)}
.proj-edit-box{display:flex;gap:6px;background:var(--ora-bg);padding:8px;border-radius:6px;border:1px solid var(--border)}
.proj-edit-box input{flex:1;border:1px solid var(--border2);border-radius:4px;padding:6px;font-size:12px;outline:none}
.proj-edit-box input:focus{border-color:var(--ora)}
.padd-row{display:flex;gap:8px;margin-top:12px}
.padd-row input{flex:1;border:1px solid var(--border2);border-radius:var(--r-xs);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;background:var(--white)}
.padd-row input:focus{border-color:var(--ora)}

.toast{position:fixed;bottom:24px;right:20px;padding:10px 18px;border-radius:12px;font-size:13px;z-index:999;opacity:0;transform:translateY(60px);transition:all .3s;pointer-events:none;font-weight:500;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#15803D;color:#fff}
.toast.err{background:#B91C1C;color:#fff}
.toast.info{background:var(--ora);color:#fff}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-ico">🍊</div>
    <div class="login-title">My To Do List</div>
    <div class="login-sub">整理公事與私人行程，同步 Google Sheets 與 Calendar。<br>請使用指定 Google 帳號登入。</div>
    <div id="g-btn" style="display:flex;justify-content:center"></div>
    <div id="login-err">❌ 初始化中...</div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-inner">
      <div class="hdr-left">
        <span class="hdr-logo">🍊</span>
        <span class="hdr-title">My To Do List</span>
      </div>
      <div class="hdr-right">
        <div class="avatar" id="u-av">U</div>
        <span class="hdr-email" id="u-em"></span>
        <button class="pill-btn" onclick="openProjModal()">⚙ 管理案子</button>
      </div>
    </div>
  </div>
  
  <div class="sync-bar">
    <div class="sync-inner">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="sync-txt" id="sync-txt">連線中…</span>

async function syncSheet(){
  setSyncStatus('syncing','同步資料中…');
  try{
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEET_ID}/values:batchGet?ranges=Tasks!A2:Z&ranges=Projects!A2:Z`;
    const r = await fetch(url, {
        headers: { 'Authorization': `Bearer ${S.sheetsToken}`, 'Cache-Control': 'no-cache' }
    });
    if(!r.ok) throw new Error();
    const data = await r.json();
    
    // 任務資料處理與本地轉移邏輯
    const tRows = data.valueRanges[0].values || [];
    if (tRows.length > 0) {
        S.tasks = tRows.map(r=>({
            id: parseInt(r[0]), type: r[1], title: r[2], code: r[3]||null,
            date: r[4], endDate: r[5]||null, time: r[6]||null, timeEnd: r[7]||null,
            loc: r[8]||'', priority: r[9], done: r[10]==='true', calEventId: r[11]||null,
            note: r[12]||'', rawInfo: r[13]||''
        }));
    } else {
        const localTasks = JSON.parse(localStorage.getItem('tm-tasks')||'[]');
        if (localTasks.length > 0) {
            S.tasks = localTasks;
            saveToSheet();
        }
    }
    
    // 專案資料處理與本地轉移邏輯
    const pRows = data.valueRanges[1].values || [];
    if (pRows.length > 0) {
        S.projects = pRows.map(r=>({code: r[0], name: r[1]}));
    } else {
        const localProjs = JSON.parse(localStorage.getItem('tm-projs')||'null');
        if (localProjs && localProjs.length > 0) {
            S.projects = localProjs;
            saveToSheet();
        }
    }
    S.projects.forEach(p=>{if(p.code!=='0000X')getColor(p.code);});
    
    setSyncStatus('ok','已同步');
    fillCodeSel(); renderView(); buildSuggestion();
  } catch(e) {
    setSyncStatus('err','讀取失敗');
  }
}

async function saveToSheet(){
  if(!S.sheetsToken) return;

    const tData = S.tasks.map(t=>[t.id, t.type, t.title, t.code||'', t.date, t.endDate||'', t.time||'', t.timeEnd||'', t.loc, t.priority, t.done, t.calEventId||'', t.note, t.rawInfo]);
    const pData = S.projects.map(p=>[p.code, p.name]);
    
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEET_ID}/values/Tasks!A2:Z?valueInputOption=RAW`, {
        method: 'PUT', headers: { 'Authorization': `Bearer ${S.sheetsToken}`, 'Content-Type': 'application/json' },

function parsePaste(){
  const text=document.getElementById('paste-box').value.trim();
  if(!text){toast('請先貼上內容','err');return;}
  const blocks=text.split(/\n?---\n?/).filter(b=>b.trim());
  const tasks=[];
  blocks.forEach(block=>{
    const get=keys=>{for(const k of keys){const m=block.match(new RegExp(k+'[：:]\\s*(.+)','i'));if(m)return m[1].trim();}return '';};
    const title=get(['任務名稱','行程名稱','名稱','title']);
    if(!title)return;
    const typeRaw=get(['類型','type']);
    const codeRaw=get(['計畫代碼','代碼','code']);
    const dateRaw=get(['開始日期','日期','date']);
    const edateRaw=get(['結束日期','end']);
    const startRaw=get(['開始時間','time','start']);
    const endRaw=get(['結束時間','endtime']);
    const prioRaw=get(['優先級','優先','priority']);
    const note=get(['說明','備註','note','description']);
    
    const type=(typeRaw.includes('私人')||typeRaw.toLowerCase()==='private')?'private':'work';
    const codeMatch=codeRaw?codeRaw.match(/\d{4}[A-Z]/):block.match(/\d{4}[A-Z]/);
    const code=type==='work'?(codeMatch?codeMatch[0]:'0000X'):null;
    
    const dateMatch=(dateRaw||'').match(/\d{4}-\d{2}-\d{2}/);
    const date=dateMatch?dateMatch[0]:new Date().toISOString().split('T')[0];
    const edateMatch=(edateRaw||'').match(/\d{4}-\d{2}-\d{2}/);
    
    const startMatch=(startRaw||'').match(/\d{1,2}:\d{2}/);
    const endMatch=(endRaw||'').match(/\d{1,2}:\d{2}/);
    const prioMap={'高':'high','中':'medium','低':'low','緊急':'high'};
    tasks.push({title,type,code,date,endDate:edateMatch?edateMatch[0]:null,time:startMatch?startMatch[0]:null,timeEnd:endMatch?endMatch[0]:null,priority:prioMap[prioRaw]||'medium',note,rawBlock:block});
  });
  if(!tasks.length){toast('找不到任務格式，請確認內容','err');return;}
  S.pending=tasks;showConfirmModal();
}

  }).join('');
  document.getElementById('confirm-modal').classList.add('show');

async function pushCal(task){
  if(!S.calToken)return null;
  const hasEnd = task.endDate && task.endDate !== task.date;
  let evStart, evEnd;
  
  if(hasEnd){
    const ed = new Date(task.endDate); ed.setDate(ed.getDate()+1);
    evStart = {date: task.date}; evEnd = {date: fmtDate(ed)};
  } else {
    const st=task.time||'09:00'; const et=task.timeEnd||addH(st);
    evStart = {dateTime:`${task.date}T${st}:00`,timeZone:'Asia/Taipei'};
    evEnd = {dateTime:`${task.date}T${et}:00`,timeZone:'Asia/Taipei'};
  }

  const ev={
    summary:task.type==='work'?`[${task.code}] ${task.title}`:task.title,
    start:evStart, end:evEnd, colorId:task.type==='work'?'9':'6',
    location:task.loc||undefined, description:task.note||undefined,
  };
  try{
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',headers:{'Authorization':`Bearer ${S.calToken}`,'Content-Type':'application/json'},body:JSON.stringify(ev)
    });
    const d=await r.json();return d.id||null;
  }catch(e){return null;}
}

async function deleteCal(eventId){
  if(!S.calToken||!eventId)return;
  try{await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`,{method:'DELETE',headers:{'Authorization':`Bearer ${S.calToken}`}});}catch(e){}
}

function setView(v){S.view=v;['list','week','cal'].forEach(x=>document.getElementById('vt-'+x).className='vtab'+(x===v?' on':''));renderView();}
function navPrev(){if(S.view==='cal'){S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}}else if(S.view==='week'){S.weekOffset--;}renderView();}
function navNext(){if(S.view==='cal'){S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}}else if(S.view==='week'){S.weekOffset++;}renderView();}
function renderView(){fillCodeSel();if(S.view==='list')renderList();else if(S.view==='week')renderWeek();else renderCal();}
function getTaskDates(task){
  if(!task.endDate||task.endDate===task.date)return[task.date];
  const dates=[];let cur=new Date(task.date);const end=new Date(task.endDate);
  while(cur<=end){dates.push(fmtDate(cur));cur.setDate(cur.getDate()+1);}
  return dates;
}

function renderList(){
  document.getElementById('nav-label').textContent='';
  const el=document.getElementById('main-view');
  const today=new Date().toISOString().split('T')[0];
  const wt=S.tasks.filter(t=>t.type==='work');
  const pt=S.tasks.filter(t=>t.type==='private');

  if(!wt.length&&!pt.length){el.innerHTML=`<div style="padding:20px"><div class="empty"><div class="empty-ico">🍊</div>目前無任務。</div></div>`;return;}

  S.projects.forEach(p=>{
    const pts=wt.filter(t=>t.code===p.code);
    if(pts.some(t=>!t.done&&(t.date<today||t.priority==='high')))S.expandedProjs.add(p.code);
  });
  
  let html='<div class="center-wrap">';
  if(wt.length){
    const projWithDate=S.projects.map(p=>{
      const pts=wt.filter(t=>t.code===p.code&&!t.done);
      const allPts=wt.filter(t=>t.code===p.code);
      if(!allPts.length)return null;
      return{...p,tasks:allPts,pendingTasks:pts,minDate:pts.length?pts.map(t=>t.date).sort()[0]:'9999'};
    }).filter(Boolean).sort((a,b)=>a.minDate>b.minDate?1:-1);

    const known=S.projects.map(p=>p.code);
    const unk=wt.filter(t=>!known.includes(t.code));
    if(unk.length)projWithDate.push({code:'???',name:'未知代碼',tasks:unk,pendingTasks:unk.filter(t=>!t.done),minDate:'9999'});

    if(projWithDate.length){
      html+=`<div style="font-size:12px;font-weight:600;color:var(--text3);margin-bottom:10px">🏢 公事任務</div>`;
      projWithDate.forEach(p=>{
        const ci=getColor(p.code); const c=COLORS[ci]||'#888'; const cb=COLOR_BG[ci]||'#f5f5f5'; const cm=COLOR_MID[ci]||'#ddd';
        const isOpen=S.expandedProjs.has(p.code);
        const urgentCnt=p.pendingTasks.filter(t=>t.priority==='high'||t.date<today).length;
        html+=`<div class="proj-block" style="--c:${c};--cb:${cb};--cm:${cm}">
          <div class="proj-header" onclick="toggleProj('${p.code}')">
            <div class="proj-color-dot"></div><span class="proj-code-badge">${p.code}</span><span class="proj-name-text">${p.name}</span>
            <div class="proj-stats">${urgentCnt?`<span class="stat-pill stat-urgent">⚠ ${urgentCnt}</span>`:''}<span class="stat-pill stat-count">${p.pendingTasks.length}</span></div>
            <span class="proj-arrow ${isOpen?'open':''}">▶</span>
          </div>
          <div class="proj-tasks ${isOpen?'open':''}">
            ${p.tasks.sort((a,b)=>a.done===b.done?a.date>b.date?1:-1:a.done?1:-1).map(t=>taskCardHTML(t,today,c)).join('')}
          </div>
        </div>`;
      });
    }
  }

  if(pt.length){
    const isOpen=S.expandedProjs.has('__priv__');
    const pendingPt=pt.filter(t=>!t.done);
    html+=`<div style="margin-top:14px;font-size:12px;font-weight:600;color:var(--text3);margin-bottom:10px">🏠 私人行程</div>
    <div class="proj-block" style="--c:#FB8C00;--cb:#FFF3E0;--cm:#FFE0B2">
      <div class="proj-header" onclick="toggleProj('__priv__')"><div class="proj-color-dot"></div><span class="proj-code-badge">私人</span><span class="proj-name-text">個人行程</span>
      <div class="proj-stats"><span class="stat-pill stat-count">${pendingPt.length}</span></div><span class="proj-arrow ${isOpen?'open':''}">▶</span></div>
      <div class="proj-tasks ${isOpen?'open':''}">${pt.sort((a,b)=>a.done===b.done?a.date>b.date?1:-1:a.done?1:-1).map(t=>taskCardHTML(t,today,'#FB8C00')).join('')}</div>
    </div>`;
  }
  html+='</div>';el.innerHTML=html;
}

function toggleProj(code){if(S.expandedProjs.has(code))S.expandedProjs.delete(code);else S.expandedProjs.add(code);renderView();}

function taskCardHTML(t,today,color){
  const overdue=t.date<today&&!t.done;
  const pc={high:'ph',medium:'pm',low:'pl'}[t.priority]||'pm';
  const isExpanded=S.expandedCards.has(t.id); const isEditing=S.editingCard===t.id;
  const codeOpts=S.projects.map(p=>`<option value="${p.code}" ${p.code===t.code?'selected':''}>${p.code} — ${p.name}</option>`).join('');
  return`<div class="task-card ${t.type==='private'?'priv':''} ${t.done?'done-card':''} ${overdue?'overdue-card':''}" style="--c:${color}">
    <div class="chk ${t.done?'on '+(t.type==='private'?'gn':''):''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</div>
    <div class="task-body" onclick="toggleCard(${t.id})">
      <div class="task-title">${overdue?'<span style="color:var(--red);font-size:10px">逾期 </span>':''}${t.title} ${t.endDate&&t.endDate!==t.date?`<span style="font-size:10px;color:var(--text3)">(跨日)</span>`:''}</div>
      <div class="task-meta"><span class="task-date">${t.date}</span><span class="prio ${pc}">${t.priority}</span>
        ${t.calEventId?`<span class="synced">✓</span>`:''}
      </div>
    </div>
    <div class="task-acts"><button class="t-btn" onclick="startEdit(${t.id})">✏️</button><button class="t-btn del" onclick="delTask(${t.id})">✕</button></div>
  </div>
  <div class="task-detail ${isExpanded||isEditing?'open':''}">
    ${isEditing?`
    <div class="edit-form open">
      <div class="edit-row"><div class="edit-field" style="grid-column:1/-1"><label>名稱</label><input type="text" id="e-title-${t.id}" value="${t.title}"></div></div>
      <div class="edit-row">${t.type==='work'?`<div class="edit-field"><label>代碼</label><select id="e-code-${t.id}">${codeOpts}</select></div>`:'<div></div>'}
      <div class="edit-field"><label>優先級</label><select id="e-prio-${t.id}"><option value="high" ${t.priority==='high'?'selected':''}>高</option><option value="medium" ${t.priority==='medium'?'selected':''}>中</option><option value="low" ${t.priority==='low'?'selected':''}>低</option></select></div></div>
      <div class="edit-row"><div class="edit-field"><label>開始日期</label><input type="date" id="e-date-${t.id}" value="${t.date}"></div><div class="edit-field"><label>結束日期</label><input type="date" id="e-edate-${t.id}" value="${t.endDate||''}"></div></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px"><button class="btn btn-soft" onclick="cancelEdit()">取消</button><button class="btn btn-ora" onclick="saveEdit(${t.id})">儲存</button></div>
    </div>`:
    isExpanded?`
    ${t.note?`<div class="detail-section"><div class="detail-label">說明</div><div class="detail-content">${t.note}</div></div>`:''}
    <div class="detail-section"><div class="detail-label">備註</div><textarea class="detail-note" onblur="saveNote(${t.id}, this.value)">${t.note||''}</textarea></div>`:''}
  </div>`;
}

function toggleCard(id){if(S.editingCard===id)return;if(S.expandedCards.has(id))S.expandedCards.delete(id);else S.expandedCards.add(id);renderView();}
function startEdit(id){S.editingCard=id;S.expandedCards.add(id);renderView();}
function cancelEdit(){S.editingCard=null;renderView();}
async function saveEdit(id){
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  t.title=document.getElementById(`e-title-${id}`).value||t.title;
  t.date=document.getElementById(`e-date-${id}`).value||t.date;
  t.endDate=document.getElementById(`e-edate-${id}`).value||null;
  t.priority=document.getElementById(`e-prio-${id}`).value;
  if(t.type==='work')t.code=document.getElementById(`e-code-${id}`).value;
  S.editingCard=null;saveToSheet();renderView();toast('✅ 儲存成功','ok');
}
function saveNote(id,val){const t=S.tasks.find(t=>t.id===id);if(t){t.note=val;saveToSheet();}}
function toggleDone(id){const t=S.tasks.find(t=>t.id===id);if(t){t.done=!t.done;saveToSheet();renderView();buildSuggestion();}}
async function delTask(id){
  if(!confirm('確定刪除？'))return;
  const t=S.tasks.find(t=>t.id===id);
  if(t&&t.calEventId){await deleteCal(t.calEventId);}
  S.tasks=S.tasks.filter(t=>t.id!==id); S.expandedCards.delete(id); saveToSheet();renderView();
}

function renderWeek(){
  const today=new Date();const monday=new Date(today);monday.setDate(today.getDate()-((today.getDay()+6)%7)+S.weekOffset*7);
  const days=[];for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d);}
  document.getElementById('nav-label').textContent=`${monday.getMonth()+1}/${monday.getDate()}`;
  const el=document.getElementById('main-view');
  el.innerHTML=`<div class="center-wrap"><div class="week-wrap"><div class="week-grid">
    <div class="time-col">${['09','10','11','12','13','14','15','16','17'].map(h=>`<div class="time-slot">${h}:00</div>`).join('')}</div>
    ${days.map(d=>{
      const ds=fmtDate(d);
      const dayTasks=S.tasks.filter(t=>getTaskDates(t).includes(ds)).sort((a,b)=>a.done===b.done?0:a.done?1:-1);
      return`<div class="week-day-col${ds===fmtDate(new Date())?' today-col':''}">
        <div class="week-day-hdr">${d.getMonth()+1}/${d.getDate()}</div>
        <div class="week-events">${dayTasks.map(t=>{
            const ci=t.type==='private'?-1:getColor(t.code||'0000X'); const c=t.type==='private'?'#FB8C00':COLORS[ci]||'#888';
            return`<div class="week-ev ${t.done?'done-ev':''}" style="border-left:2px solid ${c}">
              <div class="week-ev-title">${t.title}</div></div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div></div></div>`;
}

function renderCal(){
  document.getElementById('nav-label').textContent=`${S.calYear} / ${S.calMonth+1}`;
  const first=new Date(S.calYear,S.calMonth,1);const last=new Date(S.calYear,S.calMonth+1,0);
  let startDay=first.getDay()-1;if(startDay<0)startDay=6; let cells=[];
  for(let i=0;i<startDay;i++){const d=new Date(S.calYear,S.calMonth,1-startDay+i);cells.push({date:fmtDate(d),other:true});}
  for(let d=1;d<=last.getDate();d++)cells.push({date:`${S.calYear}-${String(S.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,other:false});
  while(cells.length%7!==0)cells.push({date:'',other:true});
  
  document.getElementById('main-view').innerHTML=`<div class="center-wrap"><div class="cal-grid">${cells.map(c=>{
    if(!c.date)return`<div class="cal-cell other-month"></div>`;
    const dayTasks=S.tasks.filter(t=>getTaskDates(t).includes(c.date));
    return`<div class="cal-cell${c.other?' other-month':''}">
      <div class="cal-num">${parseInt(c.date.split('-')[2])}</div>
      ${dayTasks.slice(0,3).map(t=>{
        const ci=t.type==='private'?-1:getColor(t.code||'0000X'); const c2=t.type==='private'?'#FB8C00':COLORS[ci]||'#888';
        return`<div class="cal-ev-dot" style="color:${c2}">${t.title}</div>`;
      }).join('')}
    </div>`;
  }).join('')}</div></div>`;
}

function buildSuggestion(){
  const el=document.getElementById('sug-txt');const tags=document.getElementById('sug-tags');
  const pending=S.tasks.filter(t=>!t.done).sort((a,b)=>a.date>b.date?1:-1);
  if(!pending.length){el.textContent='休息一下 ☕';tags.innerHTML='';return;}
  el.innerHTML=`下一個截止：<b>${pending[0].title}</b>`;
}

function openProjModal(){S.editingProj=null;renderProjList();document.getElementById('proj-modal').classList.add('show');}
function renderProjList(){
  document.getElementById('proj-list').innerHTML=S.projects.map((p)=>{
    const c=p.code==='0000X'?'#888':COLORS[getColor(p.code)]||'#888';
    if(S.editingProj===p.code){
      return`<div class="proj-edit-box">
        <input type="text" id="pe-code" value="${p.code}" maxlength="5">
        <input type="text" id="pe-name" value="${p.name}">
        <button class="pbtn" onclick="saveProjEdit('${p.code}')">✓ 儲存</button>
        <button class="pbtn" onclick="S.editingProj=null;renderProjList()">✕</button>
      </div>`;
    }
    return`<div class="proj-item">
      <div class="proj-item-row"><span class="proj-code-s" style="background:${c}">${p.code}</span><span class="proj-nm">${p.name}</span>
      ${p.code!=='0000X'?`<button class="pbtn" onclick="S.editingProj='${p.code}';renderProjList()">✏️</button><button class="pbtn pdel" onclick="delProj('${p.code}')">✕</button>`:''}</div>
    </div>`;
  }).join('');
}

async function saveProjEdit(oldCode){
  const newCode=document.getElementById('pe-code').value.trim().toUpperCase();
  const newName=document.getElementById('pe-name').value.trim();
  if(!newCode||!newName)return;
  const p=S.projects.find(x=>x.code===oldCode);if(!p)return;
  p.code=newCode; p.name=newName;
  if(newCode!==oldCode){S.tasks.forEach(t=>{if(t.code===oldCode)t.code=newCode;});}
  S.editingProj=null; saveToSheet(); renderProjList(); fillCodeSel(); renderView();
}

function addProj(){
  const code=document.getElementById('new-code').value.trim().toUpperCase();
  const name=document.getElementById('new-name').value.trim();
  if(!code||!name)return;
  S.projects.push({code,name});saveToSheet();renderProjList();fillCodeSel();
}
function delProj(code){S.projects=S.projects.filter(p=>p.code!==code);saveToSheet();renderProjList();}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className=`toast ${type}`,3000);}

</script>
</body>
</html>
